                        <div ref={endRef}></div>
                    </div>
                    <div className="p-4 bg-white/90 backdrop-blur-md border-t border-slate-100 flex gap-2 relative z-20 shrink-0">
                        <input type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter' && handleSend()} placeholder="Tanya santai soal agama..." className="flex-1 bg-slate-100 rounded-full px-4 py-2.5 text-xs font-medium outline-none focus:ring-2 transition-all" style={{ focusRingColor: theme.hex }} />
                        <button onClick={handleSend} disabled={loading} className="w-10 h-10 rounded-full flex items-center justify-center text-white shadow-md active:scale-95 transition-transform shrink-0" style={{ backgroundColor: theme.hex }}><Send size={16} className="ml-1 -mt-0.5"/></button>
                    </div>
                </div>
            );
        }

        function BookmarkView({ nav, theme, bookmarks, setBookmarks }) {
            const togglePin = (id) => {
                setBookmarks(prev => {
                    const next = prev.map(b => b.id === id ? { ...b, isPinned: !b.isPinned } : b);
                    return next.sort((a, b) => (a.isPinned === b.isPinned) ? 0 : a.isPinned ? -1 : 1);
                });
            };

            const deleteBookmark = (id) => {
                setBookmarks(prev => prev.filter(b => b.id !== id));
            };

            return (
                <div className="animate-in slide-in-from-right-4 h-full flex flex-col bg-transparent relative z-10 overflow-hidden">
                    <div className="bg-white/90 backdrop-blur-md px-5 py-4 flex items-center shadow-sm z-30">
                        <button onClick={() => nav('home')} className="p-2 rounded-[14px] bg-slate-100 mr-3 active:scale-95 transition-transform"><ArrowLeft size={18} className="text-slate-600" /></button>
                        <h1 className="text-[15px] font-black text-slate-800">Bookmark Saya</h1>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-3 pb-24">
                        {bookmarks.length === 0 ? (
                            <div className="text-center p-10 opacity-50"><Bookmark size={40} className="mx-auto mb-3 text-slate-400"/><p className="text-xs font-bold uppercase tracking-widest">Kosong</p></div>
                        ) : (
                            bookmarks.map((b) => (
                                <div key={b.id} onClick={() => nav('quran', { surahId: b.surahId })} className={`bg-white p-4 rounded-[20px] shadow-sm flex flex-col gap-3 cursor-pointer active:scale-95 border hover:border-slate-300 transition-all ${b.isPinned ? 'border-amber-300' : 'border-slate-100'}`}>
                                    <div className="flex justify-between items-center w-full">
                                        <div className="flex items-center gap-3">
                                            <div className="w-10 h-10 rounded-[14px] flex items-center justify-center" style={{ backgroundColor: theme.light, color: theme.hex }}><Bookmark size={18} /></div>
                                            <div><h3 className="font-bold text-[13px] text-slate-800 flex items-center gap-1">Surah {b.name} {b.isPinned && <Pin size={10} className="text-amber-500 fill-amber-500" />}</h3><p className="text-[10px] text-slate-500 font-medium">{b.desc}</p></div>
                                        </div>
                                        <div className="text-[9px] font-bold text-blue-500 flex items-center gap-1 bg-blue-50 px-2.5 py-1.5 rounded-[10px]">Buka <ChevronRight size={12}/></div>
                                    </div>
                                    <div className="flex gap-2 w-full justify-end border-t border-slate-50 pt-3">
                                        <button onClick={(e) => { e.stopPropagation(); togglePin(b.id); }} className={`px-4 py-1.5 rounded-[10px] flex items-center gap-1.5 font-bold text-[10px] transition-all border ${b.isPinned ? 'bg-amber-50 text-amber-600 border-amber-200' : 'bg-slate-50 text-slate-500 border-slate-100'}`}><Pin size={12} className={b.isPinned ? 'fill-amber-500' : ''} /> {b.isPinned ? 'Unpin' : 'Pin'}</button>
                                        <button onClick={(e) => { e.stopPropagation(); deleteBookmark(b.id); }} className="px-4 py-1.5 rounded-[10px] flex items-center gap-1.5 font-bold text-[10px] transition-all border bg-slate-50 text-red-500 hover:bg-red-50 border-slate-100"><Trash2 size={12} /> Hapus</button>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        }

        function SettingsView({ 
            nav, theme, setTheme, globalTajwid, setGlobalTajwid, 
            globalLatin, setGlobalLatin, globalTrans, setGlobalTrans, 
            globalFontSize, setGlobalFontSize, appQari, setAppQari, appFont, setAppFont,
            notif10Min, setNotif10Min, adzanAlarms, setAdzanAlarms,
            adzanSounds, setAdzanSounds, customAdzanFiles, setCustomAdzanFiles,
            customAdzanNames, setCustomAdzanNames, prayerTimes
        }) {
            
            const Section = ({ title, icon, children }) => (
                <div className="mb-6 relative z-10">
                    <h3 className="text-[13px] font-bold text-slate-700 flex items-center gap-2 mb-3 px-1"><span style={{ color: theme.hex }}>{icon}</span> {title}</h3>
                    <div className="bg-white rounded-[20px] p-4 shadow-sm border border-slate-100">{children}</div>
                </div>
            );

            return (
                <div className="pb-10 animate-in slide-in-from-right-4 bg-transparent relative z-10">
                    <div className="sticky top-0 bg-white/90 backdrop-blur-md px-5 pt-8 pb-4 flex items-center z-30 shadow-sm border-b border-slate-100">
                        <button onClick={() => nav('home')} className="p-2 rounded-[14px] bg-slate-800 text-white mr-4 active:scale-95 hover:bg-slate-900 transition-colors"><ArrowLeft size={18} /></button>
                        <h1 className="text-[18px] font-black text-slate-800 tracking-tight flex items-center gap-2"><Settings size={22} style={{ color: theme.hex }} /> Pengaturan Global</h1>
                    </div>
                    <div className="p-5 relative z-10">
                        
                        <Section title="Notifikasi & Alarm Adzan" icon={<Clock size={18}/>}>
                            <div className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <span className="text-[12px] font-bold text-slate-700 w-2/3">Notifikasi Peringatan 10 Menit Sebelum Waktu Shalat Tiba</span>
                                    <button onClick={() => setNotif10Min(!notif10Min)} className={`w-12 h-6 rounded-full flex items-center p-1 transition-all ${notif10Min ? 'bg-green-500 justify-end' : 'bg-slate-300 justify-start'}`}><div className="w-4 h-4 bg-white rounded-full shadow-sm"></div></button>
                                </div>
                                
                                <div className="border-t border-slate-100 pt-4 mt-2">
                                    <span className="text-[12px] font-bold text-slate-700 block mb-3">On/Off Alarm & Suara per Waktu</span>
                                    <div className="space-y-3">
                                        {prayerTimes && prayerTimes.map(p => (
                                            <div key={p.id} className="bg-slate-50 p-3 rounded-[12px] border border-slate-100">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-[11px] font-bold text-slate-700 flex items-center gap-1.5">{p.icon} {p.label}</span>
                                                    <button onClick={() => setAdzanAlarms({...adzanAlarms, [p.id]: !adzanAlarms[p.id]})} className={`w-10 h-5 rounded-full flex items-center p-1 transition-all ${adzanAlarms[p.id] ? 'bg-green-500 justify-end' : 'bg-slate-300 justify-start'}`}><div className="w-3 h-3 bg-white rounded-full shadow-sm"></div></button>
                                                </div>
                                                
                                                {adzanAlarms[p.id] && p.id !== 'Imsak' && (
                                                    <div className="mt-3 pt-3 border-t border-slate-200 animate-in fade-in slide-in-from-top-2 duration-300">
                                                        <div className="relative bg-white rounded-[10px] shadow-sm overflow-hidden flex items-center border border-slate-200 mb-2">
                                                            <select 
                                                                value={adzanSounds[p.id] || 'makkah'} 
                                                                onChange={e => setAdzanSounds({...adzanSounds, [p.id]: e.target.value})} 
                                                                className="w-full bg-transparent px-3 py-2.5 text-[11px] font-bold text-slate-700 outline-none truncate border-0 appearance-none cursor-pointer relative z-10"
                                                            >
                                                                {ADZAN_SOUNDS.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                                            </select>
                                                            <ChevronDown size={14} className="absolute right-3 text-slate-400 pointer-events-none" />
                                                        </div>
                                                        
                                                        {adzanSounds[p.id] === 'custom_file' && (
                                                            <div className="mb-2 p-2 bg-white rounded-[10px] border border-slate-200 shadow-sm flex flex-col gap-2">
                                                                <label className="text-[10px] font-bold text-slate-600">Pilih File MP3 dari HP:</label>
                                                                <input 
                                                                    type="file" 
                                                                    accept="audio/mp3, audio/mpeg" 
                                                                    onChange={(e) => {
                                                                        const file = e.target.files[0];
                                                                        if(file) {
                                                                            if (file.size > 2 * 1024 * 1024) { 
                                                                                alert("Ukuran file terlalu besar! Maksimal 2MB."); return;
                                                                            }
                                                                            const reader = new FileReader();
                                                                            reader.onload = (event) => {
                                                                                const base64Audio = event.target.result;
                                                                                try {
                                                                                    setCustomAdzanFiles({...customAdzanFiles, [p.id]: base64Audio});
                                                                                    setCustomAdzanNames({...customAdzanNames, [p.id]: file.name});
                                                                                } catch(error) { alert("Memori Browser Penuh!"); }
                                                                            };
                                                                            reader.readAsDataURL(file);
                                                                        }
                                                                    }}
                                                                    className="w-full text-[10px] text-slate-500 file:mr-2 file:py-1.5 file:px-3 file:rounded-[8px] file:border-0 file:text-[10px] file:font-bold file:bg-emerald-50 file:text-emerald-600 hover:file:bg-emerald-100 cursor-pointer"
                                                                />
                                                                {customAdzanNames[p.id] && (
                                                                    <p className="text-[9px] font-medium text-emerald-600 bg-emerald-50 p-1.5 rounded truncate">Terpilih: {customAdzanNames[p.id]}</p>
                                                                )}
                                                            </div>
                                                        )}
                                                        
                                                        <button onClick={() => { 
                                                            let sUrl = '';
                                                            if(adzanSounds[p.id] === 'custom_file' && customAdzanFiles[p.id]) sUrl = customAdzanFiles[p.id];
                                                            else sUrl = ADZAN_SOUNDS.find(s => s.id === (adzanSounds[p.id] || 'makkah'))?.url || ADZAN_SOUNDS[0].url;
                                                            
                                                            if(sUrl) {
                                                                const testAudio = new Audio(sUrl); 
                                                                testAudio.play().catch(() => alert('Browser tidak mengizinkan play')); 
                                                                setTimeout(()=>testAudio.pause(), 7000); 
                                                            } else {
                                                                alert('Silakan pilih file MP3 terlebih dahulu.');
                                                            }
                                                        }} className="w-full justify-center px-3 py-2 bg-slate-100 hover:bg-slate-200 rounded-[10px] text-[10px] text-slate-700 font-bold flex items-center gap-1.5 active:scale-95 transition-all"><Play size={12}/> Test Putar Suara</button>
                                                    </div>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </Section>

                        <Section title="Tampilan & Tema Warna" icon={<Palette size={18}/>}>
                            <div className="flex justify-between pb-2 mt-2">
                                {Object.values(THEMES).map(t => (
                                    <button key={t.id} onClick={() => setTheme(t)} className="flex flex-col items-center gap-1 group">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${theme.id === t.id ? 'ring-2 ring-offset-2 scale-110 shadow-md' : 'border border-slate-200 group-hover:scale-105'}`} style={{ backgroundColor: t.hex, ringColor: t.hex }}>
                                            {theme.id === t.id && <Check size={16} className="text-white animate-pop" strokeWidth={3} />}
                                        </div>
                                        <span className={`text-[9px] font-bold mt-1 ${theme.id === t.id ? 'text-slate-800' : 'text-slate-400'}`}>{t.id.charAt(0).toUpperCase() + t.id.slice(1)}</span>
                                    </button>
                                ))}
                            </div>
                        </Section>
                        
                        <Section title="Pengaturan Al-Quran" icon={<BookOpen size={18}/>}>
                            <div className="space-y-4">
                                <div className="flex items-center justify-between">
                                    <span className="text-[12px] font-bold text-slate-700">Warna Tajwid</span>
                                    <button onClick={() => setGlobalTajwid(!globalTajwid)} className={`w-12 h-6 rounded-full flex items-center p-1 transition-all ${globalTajwid ? 'bg-green-500 justify-end' : 'bg-slate-300 justify-start'}`}><div className="w-4 h-4 bg-white rounded-full shadow-sm"></div></button>
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className="text-[12px] font-bold text-slate-700">Teks Latin</span>
                                    <button onClick={() => setGlobalLatin(!globalLatin)} className={`w-12 h-6 rounded-full flex items-center p-1 transition-all ${globalLatin ? 'bg-green-500 justify-end' : 'bg-slate-300 justify-start'}`}><div className="w-4 h-4 bg-white rounded-full shadow-sm"></div></button>
                                </div>
                                <div className="flex items-center justify-between">
                                    <span className="text-[12px] font-bold text-slate-700">Terjemahan</span>
                                    <button onClick={() => setGlobalTrans(!globalTrans)} className={`w-12 h-6 rounded-full flex items-center p-1 transition-all ${globalTrans ? 'bg-green-500 justify-end' : 'bg-slate-300 justify-start'}`}><div className="w-4 h-4 bg-white rounded-full shadow-sm"></div></button>
                                </div>
                                
                                <div className="border-t border-slate-100 pt-4 mt-2">
                                    <span className="text-[12px] font-bold text-slate-700 block mb-2">Ukuran Font Arab: {globalFontSize}px</span>
                                    <input type="range" min="20" max="48" value={globalFontSize} onChange={(e) => setGlobalFontSize(Number(e.target.value))} className="w-full accent-green-500" />
                                </div>
                                
                                <div className="border-t border-slate-100 pt-4 mt-2">
                                    <span className="text-[12px] font-bold text-slate-700 block mb-2">Khat / Font Arab</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => setAppFont('uthmani')} className={`flex-1 py-2 rounded-xl text-[11px] font-bold transition-all border ${appFont === 'uthmani' ? 'bg-slate-800 text-white border-slate-800' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>Madinah</button>
                                        <button onClick={() => setAppFont('kemenag')} className={`flex-1 py-2 rounded-xl text-[11px] font-bold transition-all border ${appFont === 'kemenag' ? 'bg-slate-800 text-white border-slate-800' : 'bg-slate-50 text-slate-600 border-slate-200'}`}>Kemenag</button>
                                    </div>
                                </div>
                                
                                <div className="border-t border-slate-100 pt-4 mt-2">
                                    <span className="text-[12px] font-bold text-slate-700 block mb-2">Suara Qari Default</span>
                                    <div className="relative bg-slate-50 rounded-[14px] shadow-inner overflow-hidden flex items-center border border-slate-200">
                                        <select value={appQari} onChange={e => setAppQari(e.target.value)} className="w-full bg-transparent px-3 py-3 text-[12px] font-bold text-slate-700 outline-none truncate border-0 appearance-none cursor-pointer relative z-10">
                                            {QARI_LIST.map(q => <option key={q.id} value={q.id}>{q.name}</option>)}
                                        </select>
                                        <ChevronDown size={14} className="absolute right-4 text-slate-400 pointer-events-none" />
                                    </div>
                                </div>
                            </div>
                        </Section>

                        <Section title="Tentang" icon={<Info size={18}/>}>
                            <div className="p-1 text-center">
                                <div className="w-12 h-12 rounded-[16px] mx-auto flex items-center justify-center mb-2 shadow-sm" style={{ backgroundColor: theme.light, color: theme.hex }}><BookOpen size={24} /></div>
                                <h4 className="font-black text-slate-800 text-sm">Al Kautsar Islamic</h4>
                                <p className="text-[9px] text-slate-400 font-bold mb-3">Versi 22.0 (Ultimate Edition)</p>
                                <p className="text-[10px] text-slate-500 leading-relaxed font-medium text-justify">Aplikasi resmi SDIT Muhammadiyah Al Kautsar. Dilengkapi teknologi Memory Cache Instan, Al-Quran digital tajwid cerdas bersuara, Dzikir Dinamis Parabola, Arah Kiblat Real-time tanpa scroll, Alarm Adzan Background, dan Doa HPT komplit.</p>
                            </div>
                        </Section>
                    </div>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
