        function useStickyState(defaultValue, key) {
            const [value, setValue] = React.useState(() => {
                try {
                    const stickyValue = window.localStorage.getItem(key);
                    return stickyValue !== null ? JSON.parse(stickyValue) : defaultValue;
                } catch (e) { return defaultValue; }
            });
            React.useEffect(() => {
                try { window.localStorage.setItem(key, JSON.stringify(value)); } catch(e) {}
            }, [key, value]);
            return [value, setValue];

        const DOA_HPT = [
            { category: 'shalat', id: 101, title: 'Doa Iftitah', ar: 'اللَّهُمَّ بَاعِدْ بَيْنِي وَبَيْنَ خَطَايَايَ، كَمَا بَاعَدْتَ بَيْنَ المَشْرِقِ وَالمَغْرِبِ، اللَّهُمَّ نَقِّنِي مِنَ الْخَطَايَا كَمَا يُنَقَّى الثَّوْبُ الْأَبْيَضُ مِنَ الدَّنَسِ، اللَّهُمَّ اغْسِلْ خَطَايَايَ بِالْمَاءِ وَالثَّلْجِ وَالْبَرَدِ', tr: 'Ya Allah, jauhkanlah antara aku dan kesalahan-kesalahanku, sebagaimana Engkau menjauhkan antara timur dan barat. Ya Allah, bersihkanlah aku dari kesalahan sebagaimana pakaian putih dibersihkan dari kotoran. Ya Allah, cucilah kesalahan-kesalahanku dengan air, salju, dan embun.' }, { category: 'shalat', id: 102, title: 'Doa Ruku\'', ar: 'سُبْحَانَكَ اللَّهُمَّ رَبَّنَا وَبِحَمْدِكَ اللَّهُمَّ اغْفِرْ لِي', tr: 'Maha Suci Engkau Ya Allah, Tuhan kami, dan dengan memuji-Mu. Ya Allah, ampunilah aku.' }, { category: 'shalat', id: 103, title: 'Doa I\'tidal', ar: 'سَمِعَ اللَّهُ لِمَنْ حَمِدَهُ رَبَّنَا وَلَكَ الْحَمْدُ، حَمْدًا كَثِيرًا طَيِّبًا مُبَارَكًا فِيهِ', tr: 'Allah Maha Mendengar pujian orang yang memuji-Nya. Wahai Tuhan kami, bagi-Mu segala puji, aku memuji-Mu dengan pujian yang banyak, yang baik dan penuh berkah.' }, { category: 'shalat', id: 104, title: 'Doa Sujud', ar: 'سُبْحَانَكَ اللَّهُمَّ رَبَّنَا وَبِحَمْدِكَ اللَّهُمَّ اغْفِرْ لِي', tr: 'Maha Suci Engkau Ya Allah, Tuhan kami, dan dengan memuji-Mu. Ya Allah, ampunilah aku.' }, { category: 'shalat', id: 105, title: 'Duduk Di Antara 2 Sujud', ar: 'اللَّهُمَّ اغْفِرْ لِي، وَارْحَمْنِي، وَاجْبُرْنِي، وَاهْدِنِي، وَارْزُقْنِي', tr: 'Ya Allah ampunilah aku, rahmatilah aku, cukupilah kekuranganku, berilah aku petunjuk, dan berilah aku rezeki.' }, { category: 'shalat', id: 106, title: 'Tasyahud (Tahiyat)', ar: 'التَّحِيَّاتُ لِلَّهِ، وَالصَّلَوَاتُ، وَالطَّيِّبَاتُ، السَّلَامُ عَلَيْكَ أَيُّهَا النَّبِيُّ وَرَحْمَةُ اللَّهِ وَبَرَكَاتُهُ، السَّلَامُ عَلَيْنَا وَعَلَى عِبَادِ اللَّهِ الصَّالِحِينَ، أَشْهَدُ أَنْ لَا إِلَهَ إِلَّا اللَّهُ، وَأَشْهَدُ أَنَّ مُحَمَّدًا عَبْدُهُ وَرَسُولُهُ', tr: 'Segala kehormatan, kebahagiaan, dan kebagusan adalah kepunyaan Allah. Semoga keselamatan bagi Engkau, ya Nabi Muhammad, beserta rahmat dan kebahagiaan Allah. Mudah-mudahan keselamatan juga bagi kita sekalian dan hamba-hamba Allah yang baik-baik. Aku bersaksi bahwa tiada Tuhan melainkan Allah dan aku bersaksi bahwa Muhammad itu hamba Allah dan utusan-Nya.' }, { category: 'shalat', id: 107, title: 'Shalawat Nabi', ar: 'اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ، وَعَلَى آلِ مُحَمَّدٍ، كَمَا صَلَّيْتَ عَلَى إِبْرَاهِيمَ، وَعَلَى آلِ إِبْرَاهِيمَ، وَبَارِكْ عَلَى مُحَمَّدٍ، وَعَلَى آلِ مُحَمَّدٍ، كَمَا بَارَكْتَ عَلَى إِبْرَاهِيمَ، وَعَلَى آلِ إِبْرَاهِيمَ، إِنَّكَ حَمِيدٌ مَجِيدٌ', tr: 'Ya Allah, limpahkanlah kemurahan-Mu kepada Muhammad dan keluarganya, sebagaimana Engkau telah melimpahkan kepada Ibrahim dan keluarganya. Ya Allah, limpahkanlah berkat-Mu kepada Muhammad dan keluarganya, sebagaimana Engkau telah melimpahkan kepada Ibrahim dan keluarganya. Sesungguhnya Engkau Maha Terpuji dan Maha Mulia.' }, { category: 'shalat', id: 108, title: 'Doa Sebelum Salam', ar: 'اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنْ عَذَابِ جَهَنَّمَ، وَمِنْ عَذَابِ الْقَبْرِ، وَمِنْ فِتْنَةِ الْمَحْيَا وَالْمَمَاتِ، وَمِنْ شَرِّ فِتْنَةِ الْمَسِيحِ الدَّجَّالِ', tr: 'Ya Allah, aku berlindung kepada-Mu dari siksa neraka Jahanam, siksa kubur, fitnah hidup dan mati, serta dari keburukan fitnah Dajal.' }, { category: 'shalat', id: 109, title: 'Salam', ar: 'السَّلَامُ عَلَيْكُمْ وَرَحْمَةُ اللَّهِ', tr: 'Semoga keselamatan dan rahmat Allah dilimpahkan kepadamu.' },
            { category: 'dzikir', id: 201, title: '1. Istighfar (3x)', ar: 'أَسْتَغْفِرُ اللَّهَ', tr: 'Aku memohon ampun kepada Allah.' }, { category: 'dzikir', id: 202, title: '2. Doa Keselamatan', ar: 'اللَّهُمَّ أَنْتَ السَّلَامُ، وَمِنْكَ السَّلَامُ، تَبَارَكْتَ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ', tr: 'Ya Allah, Engkau Mahasejahtera, dan dari-Mu kesejahteraan, Mahasuci Engkau, wahai Tuhan Pemilik keagungan dan kemuliaan.' }, { category: 'dzikir', id: 203, title: '3. Ketauhidan & Kepasrahan', ar: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ. اللَّهُمَّ لَا مَانِعَ لِمَا أَعْطَيْتَ، وَلَا مُعْطِيَ لِمَا مَنَعْتَ، وَلَا يَنْفَعُ ذَا الْجَدِّ مِنْكَ الْجَدِّ', tr: 'Tiada tuhan selain Allah Yang Maha Esa, tiada sekutu bagi-Nya. Bagi-Nya kerajaan dan bagi-Nya segala puji. Dia Mahakuasa atas segala sesuatu. Ya Allah, tidak ada yang dapat mencegah apa yang Engkau berikan, tidak ada yang dapat memberikan apa yang Engkau cegah, dan tidak bermanfaat kekayaan bagi orang yang memilikinya (kecuali amal ketaatannya), hanya dari-Mu lah segala kekayaan.' }, { category: 'dzikir', id: 204, title: '4. Tasbih (33x)', ar: 'سُبْحَانَ اللَّهِ', tr: 'Maha Suci Allah.' }, { category: 'dzikir', id: 205, title: '5. Tahmid (33x)', ar: 'الْحَمْدُ لِلَّهِ', tr: 'Segala puji bagi Allah.' }, { category: 'dzikir', id: 206, title: '6. Takbir (33x)', ar: 'اللَّهُ أَكْبَرُ', tr: 'Allah Maha Besar.' }, { category: 'dzikir', id: 207, title: '7. Pelengkap ke-100', ar: 'لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ', tr: 'Tidak ada tuhan yang berhak disembah selain Allah semata, tidak ada sekutu bagi-Nya. Milik-Nya segala kerajaan dan milik-Nya segala pujian. Dan Dia Mahakuasa atas segala sesuatu.' }, { category: 'dzikir', id: 208, title: '8. Ayat Kursi', ar: 'اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَنْ ذَا الَّذِي يَشْفَعُ عِنْدَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ', tr: 'Allah, tidak ada tuhan selain Dia. Yang Mahahidup, Yang terus menerus mengurus (makhluk-Nya), tidak mengantuk dan tidak tidur. Milik-Nya apa yang ada di langit dan apa yang ada di bumi. Tidak ada yang dapat memberi syafaat di sisi-Nya tanpa izin-Nya. Dia mengetahui apa yang di hadapan mereka dan apa yang di belakang mereka, dan mereka tidak mengetahui sesuatu apa pun tentang ilmu-Nya melainkan apa yang Dia kehendaki. Kursi-Nya meliputi langit dan bumi. Dan Dia tidak merasa berat memelihara keduanya, dan Dia Mahatinggi, Mahabesar.' }, { category: 'dzikir', id: 209, title: '9. Surah Al-Ikhlas', ar: 'قُلْ هُوَ اللَّهُ أَحَدٌ. اللَّهُ الصَّمَدُ. لَمْ يَلِدْ وَلَمْ يُولَدْ. وَلَمْ يَكُنْ لَهُ كُفُوًا أَحَدٌ', tr: 'Katakanlah (Muhammad), "Dialah Allah, Yang Maha Esa. Allah tempat meminta segala sesuatu. (Allah) tidak beranak dan tidak pula diperanakkan. Dan tidak ada sesuatu yang setara dengan Dia."' }, { category: 'dzikir', id: 210, title: '10. Surah Al-Falaq', ar: 'قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ. مِنْ شَرِّ مَا خَلَقَ. وَمِنْ شَرِّ غَاسِقٍ إِذَا وَقَبَ. وَمِنْ شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ. وَمِنْ شَرِّ حَاسِدٍ إِذَا حَسَدَ', tr: 'Katakanlah, "Aku berlindung kepada Tuhan yang menguasai subuh (fajar), dari kejahatan (makhluk yang) Dia ciptakan, dan dari kejahatan malam apabila telah gelap gulita, dan dari kejahatan (perempuan-perempuan) penyihir yang meniup pada buhul-buhul (talinya), dan dari kejahatan orang yang dengki apabila dia dengki."' }, { category: 'dzikir', id: 211, title: '11. Surah An-Nas', ar: 'قُلْ أَعُوذُ بِرَبِّ النَّاسِ. مَلِكِ النَّاسِ. إِلَهِ النَّاسِ. مِنْ شَرِّ الْوَسْوَاسِ الْخَنَّاسِ. الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ. مِنَ الْجِنَّةِ وَالنَّاسِ', tr: 'Katakanlah, "Aku berlindung kepada Tuhannya manusia, Raja manusia, sembahan manusia, dari kejahatan (bisikan) setan yang bersembunyi, yang membisikkan (kejahatan) ke dalam dada manusia, dari (golongan) jin dan manusia."' },
            { category: 'harian', id: 301, title: 'Doa Sebelum Belajar', ar: 'رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ نَبِيًّا وَرَسُولًا. رَبِّ زِدْنِي عِلْمًا وَارْزُقْنِي فَهْمًا', tr: 'Aku rida Allah sebagai Tuhanku, Islam sebagai agamaku, dan Muhammad sebagai nabi dan rasulku. Ya Tuhanku, tambahkanlah kepadaku ilmu dan berikanlah aku karunia untuk memahaminya.' }, { category: 'harian', id: 302, title: 'Doa untuk Kedua Orang Tua', ar: 'رَبِّ اغْفِرْ لِي وَلِوَالِدَيَّ وَارْحَمْهُمَا كَمَا رَبَّيَانِي صَغِيرًا', tr: 'Ya Tuhanku, ampunilah aku dan kedua orang tuaku, dan sayangilah keduanya sebagaimana mereka menyayangiku di waktu kecil.' }, { category: 'harian', id: 303, title: 'Doa Sebelum Makan', ar: 'اللَّهُمَّ بَارِكْ لَنَا فِيمَا رَزَقْتَنَا وَقِنَا عَذَابَ النَّارِ', tr: 'Ya Allah, berkahilah kami dalam rezeki yang telah Engkau berikan kepada kami dan peliharalah kami dari siksa api neraka.' }, { category: 'harian', id: 304, title: 'Doa Setelah Makan', ar: 'الْحَمْدُ لِلَّهِ الَّذِي أَطْعَمَنَا وَسَقَانَا وَجَعَلَنَا مُسْلِمِينَ', tr: 'Segala puji bagi Allah yang telah memberi kami makan dan minum, serta menjadikan kami termasuk golongan orang-orang muslim.' }, { category: 'harian', id: 305, title: 'Doa Sebelum Tidur', ar: 'بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا', tr: 'Dengan nama-Mu ya Allah, aku mati dan aku hidup.' }, { category: 'harian', id: 306, title: 'Doa Bangun Tidur', ar: 'الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَ مَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ', tr: 'Segala puji bagi Allah yang telah menghidupkan kami setelah mematikan kami, dan kepada-Nya lah kami dibangkitkan.' }, { category: 'harian', id: 307, title: 'Doa Masuk Kamar Mandi', ar: 'اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْخُبُثِ وَالْخَبَائِثِ', tr: 'Ya Allah, sesungguhnya aku berlindung kepada-Mu dari godaan setan laki-laki dan setan perempuan.' }, { category: 'harian', id: 308, title: 'Doa Keluar Kamar Mandi', ar: 'غُفْرَانَكَ', tr: 'Aku memohon ampunan-Mu.' }, { category: 'harian', id: 309, title: 'Doa Keluar Rumah', ar: 'بِسْمِ اللَّهِ تَوَكَّلْتُ عَلَى اللَّهِ، لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ', tr: 'Dengan nama Allah, aku bertawakkal kepada-Nya, tidak ada daya dan kekuatan kecuali dengan pertolongan Allah.' }, { category: 'harian', id: 310, title: 'Doa Naik Kendaraan', ar: 'سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ، وَإِنَّا إِلَى رَبِّنَا لَمُنْقَلِبُونَ', tr: 'Maha Suci Allah yang telah menundukkan kendaraan ini bagi kami, padahal kami sebelumnya tidak mampu menguasainya. Dan sesungguhnya kepada Tuhan kami lah kami akan kembali.' }, { category: 'harian', id: 311, title: 'Doa Kebaikan Dunia Akhirat (Sapu Jagat)', ar: 'رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ', tr: 'Ya Tuhan kami, berilah kami kebaikan di dunia dan kebaikan di akhirat, dan peliharalah kami dari siksa api neraka.' },
            { category: 'sunnah', subCat: 'pagi_petang', id: 401, title: 'Sayyidul Istighfar', ar: 'اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ', tr: 'Ya Allah, Engkau adalah Tuhanku, tidak ada Tuhan yang berhak disembah selain Engkau. Engkau telah menciptakanku dan aku adalah hamba-Mu. Aku senantiasa berada dalam perjanjian dan janji-Mu semampuku. Aku berlindung kepada-Mu dari keburukan perbuatanku. Aku mengakui nikmat-Mu kepadaku dan aku mengakui dosaku, maka ampunilah aku. Sesungguhnya tidak ada yang dapat mengampuni dosa kecuali Engkau.' }, { category: 'sunnah', subCat: 'puasa', id: 402, title: 'Doa Berbuka Puasa', ar: 'ذَهَبَ الظَّمَأُ، وَابْتَلَّتِ الْعُرُوقُ، وَثَبَتَ الْأَجْرُ إِنْ شَاءَ اللَّهُ', tr: 'Telah hilang rasa haus, telah basah urat-urat, dan telah ditetapkan pahala, insya Allah.' }, { category: 'sunnah', subCat: 'shalat', id: 403, title: 'Dzikir Setelah Witir', ar: 'سُبْحَانَ الْمَلِكِ الْقُدُّوسِ', tr: 'Maha Suci Allah, Raja Yang Maha Suci. (Dibaca 3x, yang ketiga dipanjangkan dan dikeraskan suaranya)' }, { category: 'sunnah', subCat: 'shalat', id: 404, title: 'Doa Sujud Tilawah', ar: 'سَجَدَ وَجْهِي لِلَّذِي خَلَقَهُ، وَشَقَّ سَمْعَهُ وَبَصَرَهُ، بِحَوْلِهِ وَقُوَّتِهِ', tr: 'Telah sujud wajahku kepada Dzat yang menciptakannya, yang membukakan pendengaran dan penglihatannya dengan daya dan kekuatan-Nya.' }, { category: 'sunnah', subCat: 'sosial', id: 405, title: 'Doa Turun Hujan', ar: 'اللَّهُمَّ صَيِّبًا نَافِعًا', tr: 'Ya Allah, turunkanlah hujan yang bermanfaat.' }, { category: 'sunnah', subCat: 'sosial', id: 406, title: 'Doa Hujan Reda', ar: 'مُطِرْنَا بِفَضْلِ اللَّهِ وَرَحْمَتِهِ', tr: 'Kita diberi hujan karena karunia dan rahmat Allah.' }, { category: 'sunnah', subCat: 'sosial', id: 407, title: 'Doa Mendengar Petir', ar: 'سُبْحَانَ الَّذِي يُسَبِّحُ الرَّعْدُ بِحَمْدِهِ وَالْمَلَائِكَةُ مِنْ خِيفَتِهِ', tr: 'Maha Suci Allah yang petir bertasbih dengan memuji-Nya, begitu juga para malaikat karena takut kepada-Nya.' }, { category: 'sunnah', subCat: 'sosial', id: 408, title: 'Doa Menjenguk Sakit', ar: 'لَا بَأْسَ طَهُورٌ إِنْ شَاءَ اللَّهُ', tr: 'Tidak mengapa, semoga sakitmu ini membersihkan dosamu, Insya Allah.' }, { category: 'sunnah', subCat: 'sosial', id: 409, title: 'Ketika Bersin', ar: 'الْحَمْدُ لِلَّهِ', tr: 'Segala puji bagi Allah.' }, { category: 'sunnah', subCat: 'sosial', id: 410, title: 'Menjawab Orang Bersin', ar: 'يَرْحَمُكَ اللَّهُ', tr: 'Semoga Allah merahmatimu. (Dijawab kembali oleh yang bersin: Yahdikumullahu wa yushlihu baalakum)' }
        ];

        function App() {
            // STATE DENGAN MEMORI PERMANEN (LocalStorage)
            const [activeTab, setActiveTab] = useStickyState('home', 'ak_activeTab');
            const [navParams, setNavParams] = useState(null);
            
            const [appTheme, setAppTheme] = useStickyState(THEMES.hijau, 'ak_theme'); 
            const [appQari, setAppQari] = useStickyState('alafasy', 'ak_qari'); 
            const [appFont, setAppFont] = useStickyState('uthmani', 'ak_font'); 
            const [globalTajwid, setGlobalTajwid] = useStickyState(true, 'ak_tajwid');
            const [globalLatin, setGlobalLatin] = useStickyState(false, 'ak_latin');
            const [globalTrans, setGlobalTrans] = useStickyState(true, 'ak_trans');
            const [globalFontSize, setGlobalFontSize] = useStickyState(26, 'ak_fontSize');

            const [notif10Min, setNotif10Min] = useStickyState(true, 'ak_notif10Min');
            const [adzanAlarms, setAdzanAlarms] = useStickyState({ Imsak: false, Fajr: true, Dhuhr: true, Asr: true, Maghrib: true, Isha: true }, 'ak_adzanAlarms');
            const [adzanSounds, setAdzanSounds] = useStickyState({ Fajr: 'makkah', Dhuhr: 'makkah', Asr: 'makkah', Maghrib: 'makkah', Isha: 'makkah' }, 'ak_adzanSounds');
            
            const [customAdzanFiles, setCustomAdzanFiles] = useStickyState({}, 'ak_customAdzanFiles');
            const [customAdzanNames, setCustomAdzanNames] = useStickyState({}, 'ak_customAdzanNames');
            
            const [bookmarks, setBookmarks] = useStickyState([
                { id: 1, surahId: 36, name: 'Ya Sin', desc: 'Jantung Al-Quran', isPinned: true }, 
                { id: 2, surahId: 114, name: 'An-Nas', desc: 'Sering dibaca', isPinned: false },
                { id: 3, surahId: 18, name: 'Al-Kahf', desc: 'Sunnah Jumat', isPinned: false }
            ], 'ak_bookmarks');

            // LOGIKA PWA PINTAR (Hanya Muncul 1x)
            const APP_VERSION = 'v22'; // Update ini untuk memunculkan notif fitur baru!
            const [showInstall, setShowInstall] = useState(false);
            const [showSplash, setShowSplash] = useState(true);

            useEffect(() => {
                const splashTimer = setTimeout(() => {
                    setShowSplash(false);
                    const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
                    const installedVersion = window.localStorage.getItem('ak_installed_version');
                    
                    if (!isStandalone && installedVersion !== APP_VERSION) {
                        setShowInstall(true); // Munculkan pop-up install / update fitur
                    }
                }, 2500);
                return () => clearTimeout(splashTimer);
            }, []);

            const handleInstallClick = () => {
                window.localStorage.setItem('ak_installed_version', APP_VERSION);
                setShowInstall(false);
                initNotifAndAudio(); // Izin Notif + Audio WakeLock
                alert('Terkonfirmasi! Jika Anda menggunakan browser Chrome, tekan "Tambahkan ke Layar Utama" (Add to Homescreen) di menu browser untuk menginstal.');
            };

            const [userLoc, setUserLoc] = useState(window.AL_KAUTSAR_CACHE.loc);
            const [prayerTimes, setPrayerTimes] = useState(window.AL_KAUTSAR_CACHE.prayerTimes);
            const [ringingAdzan, setRingingAdzan] = useState(null);
            
            const adzanAudio = useRef(null);
            const silentAudio = useRef(null); // AUDIO SILUMAN ANTI-SLEEP
            const notifiedPrayers = useRef({});

            useEffect(() => { 
                adzanAudio.current = new Audio(); 
                // Base64 MP3 Siluman 1 detik tanpa suara
                silentAudio.current = new Audio('data:audio/mp3;base64,SUQzBAAAAAAAI1RTU0UAAAAPAAADTGF2ZjU4LjI5LjEwMAAAAAAAAAAAAAAA//tQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAASW5mbwAAAA8AAAAEAAABIwBRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFRUVFR');
                silentAudio.current.loop = true;
            }, []);

            const initNotifAndAudio = () => {
                if ('Notification' in window) Notification.requestPermission();
                
                // MENGHIDUPKAN WAKE-LOCK SILUMAN
                if (silentAudio.current) {
                    silentAudio.current.play().catch(e => {}); // Tangkap error secara diam-diam agar tidak menuhin console
                }
            };

            // CHECKER BACKGROUND (Aman dari Sleep Mode karena Audio Siluman)
            useEffect(() => {
                const checker = setInterval(() => {
                    if (!prayerTimes || prayerTimes.length === 0) return;
                    
                    const now = new Date();
                    const dateStr = now.toLocaleDateString('id-ID');
                    const currentHHMM = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

                    prayerTimes.forEach(p => {
                        const [h, m] = p.time.split(':').map(Number);
                        
                        let pTimeDate = new Date();
                        pTimeDate.setHours(h, m, 0, 0);
                        let before10m = new Date(pTimeDate.getTime() - 10 * 60000);
                        let beforeHHMM = before10m.getHours().toString().padStart(2, '0') + ':' + before10m.getMinutes().toString().padStart(2, '0');

                        const key10m = `${dateStr}_${p.id}_10m`;
                        const keyExact = `${dateStr}_${p.id}_exact`;

                        // 1. Notif 10 Menit
                        if (notif10Min && adzanAlarms[p.id] && p.id !== 'Imsak' && currentHHMM === beforeHHMM && !notifiedPrayers.current[key10m]) {
                            notifiedPrayers.current[key10m] = true;
                            if ('Notification' in window && Notification.permission === 'granted') {
                                if ('serviceWorker' in navigator && navigator.serviceWorker.ready) {
                                    navigator.serviceWorker.ready.then(reg => reg.showNotification(`Persiapan Shalat ${p.label}`, { body: `Waktu shalat kurang 10 menit lagi (${p.time}). Yuk siap-siap ambil wudhu!`, icon: 'https://raw.githubusercontent.com/nashrulaziz7/quran-data/main/islamic.png' }));
                                } else {
                                    new Notification(`Persiapan Shalat ${p.label}`, { body: `Waktu shalat kurang 10 menit lagi (${p.time}). Yuk siap-siap ambil wudhu!` });
                                }
                            }
                        }

                        // 2. Alarm Pas Waktu
                        if (adzanAlarms[p.id] && currentHHMM === p.time && !notifiedPrayers.current[keyExact]) {
                            notifiedPrayers.current[keyExact] = true;
                            
                            if ('Notification' in window && Notification.permission === 'granted') {
                                if ('serviceWorker' in navigator && navigator.serviceWorker.ready) {
                                    navigator.serviceWorker.ready.then(reg => reg.showNotification(`Waktu ${p.label} Tiba`, { body: `Telah masuk waktu ${p.label} untuk wilayah ${userLoc.name} dan sekitarnya.`, icon: 'https://raw.githubusercontent.com/nashrulaziz7/quran-data/main/islamic.png' }));
                                } else {
                                    new Notification(`Waktu ${p.label} Tiba`, { body: `Telah masuk waktu ${p.label} untuk wilayah ${userLoc.name} dan sekitarnya.` });
                                }
                            }
                            
                            if (p.id !== 'Imsak') {
                                if (adzanAudio.current) {
                                    let sUrl = '';
                                    const soundId = adzanSounds[p.id] || 'makkah';
                                    if(soundId === 'custom_file' && customAdzanFiles[p.id]) {
                                        sUrl = customAdzanFiles[p.id]; 
                                    } else {
                                        const found = ADZAN_SOUNDS.find(s => s.id === soundId);
                                        sUrl = found ? found.url : ADZAN_SOUNDS[0].url;
                                    }
                                    
                                    adzanAudio.current.src = sUrl;
                                    adzanAudio.current.currentTime = 0;
                                    adzanAudio.current.play().catch(e => console.log('Autoplay ditahan browser'));
                                }
                                setRingingAdzan(p);
                            }
                        }
                    });

                        if(resLoc && resLoc.ok) {
                            const dataLoc = await resLoc.json();

                        if (resP && resP.ok) {

                            }
                        }

                if (navigator.geolocation) {

                        (pos) => fetchLocationData(pos.coords.latitude, pos.coords.longitude),
                        () => fetchLocationData(-7.5666, 110.8166)
                    );
                } else {

            useEffect(() => { const t = setInterval(() => setTime(new Date()), 1000); return () => clearInterval(t); }, []);

            const getNextPrayer = () => {
                const currentMins = time.getHours() * 60 + time.getMinutes();
                let next = prayerTimes[0]; let isTom = true;
                for (let p of prayerTimes) {
                    const [h, m] = p.time.split(':').map(Number);
                    if (h * 60 + m > currentMins) { next = p; isTom = false; break; }
                }
                const [nH, nM] = next.time.split(':').map(Number);
                let target = new Date(time); target.setHours(nH, nM, 0);
                if (isTom) target.setDate(target.getDate() + 1);
                
                const diff = target - time;
                const hrs = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
                const mins = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
                const secs = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
                return { ...next, diff: `${hrs}:${mins}:${secs}` };

        function QuranView({ nav, navParams, theme, qari, setQari, fontType, setFontType, globalTajwid, globalLatin, globalTrans, globalFontSize, bookmarks, setBookmarks }) {
            const [search, setSearch] = useState('');
            const [activeSurah, setActiveSurah] = useState(null);
            
            const [surahDetail, setSurahDetail] = useState(null);
            const [isFetching, setIsFetching] = useState(false);

            const [playingAyah, setPlayingAyah] = useState(null);
            const [playingPart, setPlayingPart] = useState(null); 
            const audioRef = useRef(new Audio());
            const [isPlayAll, setIsPlayAll] = useState(false);

            const [surahDesc, setSurahDesc] = useState('');
            const [showTajwid, setShowTajwid] = useState(globalTajwid);
            const [showTrans, setShowTrans] = useState(globalTrans);
            const [showLatin, setShowLatin] = useState(globalLatin);
            const [fontSize, setFontSize] = useState(globalFontSize);
            
            const [openedTafsir, setOpenedTafsir] = useState(null);
            const [activeTafsirTab, setActiveTafsirTab] = useState('kemenag'); 
            const [showSettings, setShowSettings] = useState(false);
            const [showAsbabun, setShowAsbabun] = useState(false);
            
            const [showSwitcher, setShowSwitcher] = useState(false);
            const [switcherTab, setSwitcherTab] = useState('surah');
            const [isPageMode, setIsPageMode] = useState(false);
            const [activeTajweed, setActiveTajweed] = useState(null); 
            const [isScrolled, setIsScrolled] = useState(false);
            const [toastMsg, setToastMsg] = useState(null);
            
            const playingAyahRef = useRef(playingAyah);
            const playingPartRef = useRef(playingPart);
            const surahDetailRef = useRef(surahDetail);
            const isPlayAllRef = useRef(isPlayAll);
            const activeSurahRef = useRef(activeSurah);

            useEffect(() => { playingAyahRef.current = playingAyah; }, [playingAyah]);
            useEffect(() => { playingPartRef.current = playingPart; }, [playingPart]);
            useEffect(() => { surahDetailRef.current = surahDetail; }, [surahDetail]);
            useEffect(() => { isPlayAllRef.current = isPlayAll; }, [isPlayAll]);
            useEffect(() => { activeSurahRef.current = activeSurah; }, [activeSurah]);

            useEffect(() => {
                setShowTajwid(globalTajwid); setShowLatin(globalLatin); setShowTrans(globalTrans); setFontSize(globalFontSize);
            }, [globalTajwid, globalLatin, globalTrans, globalFontSize]);

            useEffect(() => {
                const scrollContainer = document.getElementById('main-scroll-container');
                const handleScroll = () => {
                    if (scrollContainer && scrollContainer.scrollTop > 90) setIsScrolled(true);
                    else setIsScrolled(false);
                };
                if (scrollContainer) scrollContainer.addEventListener('scroll', handleScroll);
                return () => { if (scrollContainer) scrollContainer.removeEventListener('scroll', handleScroll); };
            }, [activeSurah]);

            const filteredSurahs = SURAHS_DB.filter(s => s.id.toLowerCase().includes(search.toLowerCase()) || s.n.toString() === search);

            useEffect(() => {
                if (navParams && navParams.surahId) {
                    const targetSurah = SURAHS_DB.find(s => s.n === navParams.surahId);
                    if(targetSurah) openSurah(targetSurah);
                }
            }, [navParams]);

            const playAyahSequence = (ayahNum) => {
                if (!surahDetailRef.current) return;
                const targetAyah = surahDetailRef.current.find(a => a.numberInSurah === ayahNum);
                if (!targetAyah) { setIsPlayAll(false); return; }

                const needsBismillah = ayahNum === 1 && activeSurahRef.current?.n !== 1 && activeSurahRef.current?.n !== 9;
                setPlayingAyah(ayahNum);

                const playSafe = (src) => {
                    try {
                        audioRef.current.src = src;
                        audioRef.current.load();
                        const playPromise = audioRef.current.play();
                        
                        if (playPromise !== undefined) {
                            playPromise.catch(error => {
                                if (error.name === 'AbortError') return;
                                if (playingPartRef.current === 'bismillah') {
                                    setPlayingPart('ayah');
                                    playSafe(getAudioUrl(qari, activeSurahRef.current.n, targetAyah.numberInSurah));
                                } else {
                                    if (isPlayAllRef.current && activeSurahRef.current && ayahNum < activeSurahRef.current.ay) {
                                        playAyahSequence(ayahNum + 1);
                                        scrollToAyah(ayahNum + 1);
                                    } else {
                                        setPlayingAyah(null); setPlayingPart(null); setIsPlayAll(false);
                                    }
                                }
                            });
                        }
                    } catch(err) {}
                };

                if (needsBismillah) { setPlayingPart('bismillah'); playSafe(BISMILLAH_UNIVERSAL); } 
                else { setPlayingPart('ayah'); playSafe(getAudioUrl(qari, activeSurahRef.current.n, targetAyah.numberInSurah)); }
            };

            useEffect(() => {
                const handleAudioEnded = () => {
                    if (!playingAyahRef.current || !surahDetailRef.current || !activeSurahRef.current) return;
                    const currentNum = playingAyahRef.current;
                    const currentPart = playingPartRef.current;
                    
                    if (currentPart === 'bismillah') {
                        setPlayingPart('ayah');
                        const aObj = surahDetailRef.current.find(a => a.numberInSurah === currentNum);
                        if(aObj) {
                            audioRef.current.src = getAudioUrl(qari, activeSurahRef.current.n, currentNum);
                            const playPromise = audioRef.current.play();
                            if(playPromise !== undefined) playPromise.catch(e => {});
                        }
                    } else {
                        if (isPlayAllRef.current && currentNum < activeSurahRef.current.ay) {
                            const nextAyahNum = currentNum + 1;
                            setPlayingAyah(nextAyahNum); setPlayingPart('ayah'); 
                            audioRef.current.src = getAudioUrl(qari, activeSurahRef.current.n, nextAyahNum);
                            const playPromise = audioRef.current.play();
                            if(playPromise !== undefined) playPromise.catch(e => {});
                            scrollToAyah(nextAyahNum);
                        } else {
                            setPlayingAyah(null); setPlayingPart(null); setIsPlayAll(false);
                        }
                    }
                };
                const audioEl = audioRef.current;
                audioEl.addEventListener('ended', handleAudioEnded);
                return () => { if (audioEl) { audioEl.removeEventListener('ended', handleAudioEnded); audioEl.pause(); } };
            }, [qari]);

            const openSurah = async (surah) => {
                setActiveSurah(surah); 
                setOpenedTafsir(null); setShowSwitcher(false); setShowSettings(false);
                setIsPlayAll(false); setShowAsbabun(false); setActiveTajweed(null); setIsScrolled(false);
                
                if (window.AL_KAUTSAR_CACHE.surahs[surah.n]) {
                    setSurahDetail(window.AL_KAUTSAR_CACHE.surahs[surah.n]);
                    setSurahDesc(window.AL_KAUTSAR_CACHE.surahs[surah.n].desc);
                    setIsFetching(false);
                    return;
                }

                setSurahDetail(null);
                setIsFetching(true);
                
                try {
                    const pKemenag = fetch(`https://equran.id/api/v2/surat/${surah.n}`).then(r => r.json());
                    const pTajweed = fetch(`https://raw.githubusercontent.com/nashrulaziz7/quran-data/main/${surah.n}.json`).then(r => r.json()).catch(() => []);

                    const [resKem, resTaj] = await Promise.all([pKemenag, pTajweed]);

                    const dG = Array.isArray(resTaj) ? resTaj : (resTaj.data || []);
                    const desc = resKem.data.deskripsi;
                    setSurahDesc(desc);
                    
                    let ayahs = resKem.data.ayat.map(a => {
                        const g = dG.find(x => x.aya_number === a.nomorAyat || x.nomorAyat === a.nomorAyat) || {};
                        return {
                            numberInSurah: a.nomorAyat,
                            text: g.aya_text || a.teksArab,
                            latin: a.teksLatin,
                            trans: a.teksIndonesia,
                            tajweedRules: g.tajweed || g.tajwid || [], 
                            tafsirKemenag: "Memuat tafsir...",
                            tafsirJalalayn: "Memuat tafsir..."
                        };
                    });

                    setSurahDetail(ayahs);
                    setIsFetching(false);

                    window.AL_KAUTSAR_CACHE.surahs[surah.n] = ayahs;
                    window.AL_KAUTSAR_CACHE.surahs[surah.n].desc = desc;

                    Promise.allSettled([
                        fetch(`https://equran.id/api/v2/tafsir/${surah.n}`),
                        fetch(`https://api.alquran.cloud/v1/surah/${surah.n}/id.jalalayn`)
                    ]).then(async ([resTK, resTJ]) => {
                        let dTK = null, dTJ = null;
                        if (resTK.status === 'fulfilled' && resTK.value.ok) dTK = await resTK.value.json();
                        if (resTJ.status === 'fulfilled' && resTJ.value.ok) dTJ = await resTJ.value.json();

                        setSurahDetail(prev => {
                            if (!prev) return prev;
                            const updated = prev.map((a, index) => {
                                let tKem = a.tafsirKemenag;
                                if (dTK && dTK.data && dTK.data.tafsir) { const ft = dTK.data.tafsir.find(t => t.ayat === a.numberInSurah); if (ft && ft.teks) tKem = ft.teks; }
                                let tJal = a.tafsirJalalayn;
                                if (dTJ && dTJ.data && dTJ.data.ayahs && dTJ.data.ayahs[index]) tJal = dTJ.data.ayahs[index].text;
                                return { ...a, tafsirKemenag: tKem, tafsirJalalayn: tJal };
                            });
                            window.AL_KAUTSAR_CACHE.surahs[surah.n] = updated; 
                            return updated;
                        });
                    });

                } catch (err) {
                    setIsFetching(false);
                    setSurahDetail([{numberInSurah: 1, text: "Gagal memuat data.", latin: "", trans: "Periksa koneksi internet Anda.", tajweedRules: [], tafsirKemenag: "", tafsirJalalayn: ""}]);
                }
            };

            const scrollToAyah = (ayahNum) => {
                 const el = document.getElementById(`ayah-${ayahNum}`);
                 if(el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); const originalBg = el.style.backgroundColor; el.style.backgroundColor = theme.light; el.style.transition = 'background-color 0.5s ease'; setTimeout(() => { el.style.backgroundColor = originalBg; }, 2000); }
                 setShowSwitcher(false);
            };

            const renderArabicWithTajweed = (text, rules) => {
                if (!showTajwid || !rules || rules.length === 0 || !text) return text;
                let elements = []; let lastIndex = 0; const sortedRules = [...rules].sort((a, b) => a.start - b.start);

                sortedRules.forEach((rule, idx) => {
                    if (rule.start > lastIndex) elements.push(<span key={`plain-${idx}`}>{text.slice(lastIndex, rule.start)}</span>);
                    elements.push(
                        <span key={`tajweed-${idx}`} className={`tajweed-${rule.class} cursor-pointer hover:opacity-70 transition-all`} onClick={(e) => { e.preventDefault(); e.stopPropagation(); setActiveTajweed({ ruleClass: rule.class, word: text.slice(rule.start, rule.end) }); }}>
                            {text.slice(rule.start, rule.end)}
                        </span>
                    );
                    lastIndex = rule.end;
                });
                if (lastIndex < text.length) elements.push(<span key={`plain-end`}>{text.slice(lastIndex)}</span>);
                return elements;
            };

            const handleAddBookmarkSurah = () => {
                const exists = bookmarks.find(b => b.surahId === activeSurah.n);
                if(!exists) {
                    setBookmarks([...bookmarks, { id: Date.now(), surahId: activeSurah.n, name: activeSurah.id, desc: 'Tersimpan', isPinned: false }]);
                    setToastMsg(`Surah ${activeSurah.id} ditambahkan ke Bookmark!`);
                } else {
                    setToastMsg(`Surah ${activeSurah.id} sudah ada di Bookmark!`);
                }
                setTimeout(() => setToastMsg(null), 2500);
            };

            const handleAddBookmarkAyah = (ayahNum) => {
                setBookmarks([...bookmarks, { id: Date.now(), surahId: activeSurah.n, name: activeSurah.id, desc: `Ayat ${ayahNum}`, isPinned: false }]);
                setToastMsg(`Ayat ${ayahNum} ditambahkan ke Bookmark!`);
                setTimeout(() => setToastMsg(null), 2500);
            };

            if (activeSurah) {
                return (
                    <div className="pb-4 min-h-full relative bg-transparent flex flex-col">
                        
                        {/* Header Dinamis */}
                        <div className="sticky top-0 z-40 w-full bg-white shadow-sm border-b border-slate-100">
                            <div className="flex items-center justify-between px-3 py-3 h-[52px] relative z-20">
                                <div className="flex items-center gap-1 flex-1 min-w-0">
                                    <button onClick={() => { setActiveSurah(null); if (audioRef.current) { audioRef.current.pause(); audioRef.current.removeAttribute('src'); audioRef.current.load(); } setPlayingAyah(null); setPlayingPart(null); setIsPlayAll(false); }} className="p-2 rounded-xl transition-all text-slate-600 hover:bg-slate-100 active:scale-95 shrink-0">
                                        <ArrowLeft size={20} />
                                    </button>
                                    
                                    <div className="flex flex-col justify-center ml-1 overflow-hidden h-full cursor-pointer group" onClick={() => setShowSwitcher(true)}>
                                        <div className={`transition-all duration-300 ease-out flex flex-col ${isScrolled ? 'translate-y-0 opacity-100' : 'translate-y-6 opacity-0'}`}>
                                            <h2 className="font-black text-[13px] text-slate-800 tracking-tight leading-none truncate flex items-center gap-1 group-hover:text-slate-500 transition-colors">
                                                {activeSurah.n}. {activeSurah.id} <ChevronDown size={12} className="opacity-40" />
                                            </h2>
                                            <p className="text-[9px] font-bold text-slate-500 truncate mt-0.5">{activeSurah.type} • {activeSurah.ay} Ayat</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="flex items-center shrink-0 text-slate-600 gap-0.5">
                                    <button onClick={() => setIsPageMode(!isPageMode)} className={`p-2 rounded-xl transition-all hover:bg-slate-100 active:scale-95 ${isPageMode ? 'bg-slate-100 text-slate-900' : ''}`} title="Mode Halaman">
                                        {isPageMode ? <BookOpen size={18} /> : <LayoutGrid size={18} />}
                                    </button>
                                    <button onClick={handleAddBookmarkSurah} className="p-2 rounded-xl transition-all hover:bg-slate-100 active:scale-95" title="Bookmark Surah">
                                        <Bookmark size={18} />
                                    </button>
                                    <button onClick={() => setShowAsbabun(true)} className="p-2 rounded-xl transition-all hover:bg-slate-100 active:scale-95" title="Asbabun Nuzul">
                                        <Info size={18} />
                                    </button>
                                    <button onClick={() => {
                                        if (isPlayAll) { setIsPlayAll(false); if (!audioRef.current.paused) audioRef.current.pause(); setPlayingAyah(null); setPlayingPart(null); } 
                                        else { setIsPlayAll(true); if (!surahDetail || surahDetail.length === 0) return; playAyahSequence(1); scrollToAyah(1); }
                                    }} className={`p-2 rounded-xl transition-all hover:bg-slate-100 active:scale-95 ${isPlayAll ? 'bg-slate-100 text-red-500' : ''}`} title="Putar Semua Ayat">
                                        {isPlayAll ? <Pause size={18} /> : <ListMusic size={18} />}
                                    </button>
                                    <button onClick={() => setShowSettings(!showSettings)} className={`p-2 rounded-xl transition-all hover:bg-slate-100 active:scale-95 ${showSettings ? 'bg-slate-100 text-slate-900' : ''}`} title="Pengaturan">
                                        <Settings2 size={18} />
                                    </button>
                                </div>
                            </div>

                            <div className="overflow-hidden transition-all duration-500 absolute w-full z-10 bg-white border-b border-slate-200" style={{ top: '100%', left: 0, boxShadow: showSettings ? '0 10px 15px -3px rgba(0, 0, 0, 0.05)' : 'none', maxHeight: showSettings ? '200px' : '0px', opacity: showSettings ? 1 : 0 }}>
                                <div className="px-4 pb-4 pt-3" style={{ backgroundColor: theme.hex }}>
                                    <div className="flex flex-col gap-3 relative z-10">
                                        <div className="flex gap-2">
                                            <div className="flex items-center p-1 rounded-[14px] shrink-0 bg-white/20 shadow-inner backdrop-blur-sm">
                                                <span className="text-[10px] font-black text-white px-2 opacity-90 uppercase tracking-widest hidden sm:block">Ukuran</span>
                                                <button onClick={() => setFontSize(Math.max(20, fontSize - 2))} className="w-8 h-8 flex items-center justify-center bg-white rounded-[10px] shadow-sm text-slate-800 font-bold active:scale-95 text-lg leading-none">-</button>
                                                <span className="text-[13px] font-black text-white w-8 text-center">{fontSize}</span>
                                                <button onClick={() => setFontSize(Math.min(48, fontSize + 2))} className="w-8 h-8 flex items-center justify-center bg-white rounded-[10px] shadow-sm text-slate-800 font-bold active:scale-95 text-lg leading-none">+</button>
                                            </div>
                                            <div className="flex-1 relative bg-white rounded-[14px] shadow-sm overflow-hidden flex items-center">
                                                <select value={qari} onChange={e => { setQari(e.target.value); if(!audioRef.current.paused) audioRef.current.pause(); setPlayingAyah(null); }} className="w-full bg-transparent px-3 py-2 text-[11px] font-bold text-slate-700 outline-none truncate border-0 appearance-none cursor-pointer relative z-10">
                                                    {QARI_LIST.map(q => <option key={q.id} value={q.id}>{q.name}</option>)}
                                                </select>
                                                <ChevronDown size={14} className="absolute right-3 text-slate-400 pointer-events-none" />
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <div className="flex flex-1 p-1 rounded-[14px] gap-1 bg-white/20 shadow-inner backdrop-blur-sm">
                                                <button onClick={() => setShowTajwid(!showTajwid)} className={`flex-1 py-2 rounded-[10px] text-[10px] font-bold transition-all ${showTajwid ? 'bg-white shadow-sm text-slate-800' : 'text-white hover:bg-white/10'}`}>Tajwid</button>
                                                <button onClick={() => setShowLatin(!showLatin)} className={`flex-1 py-2 rounded-[10px] text-[10px] font-bold transition-all ${showLatin ? 'bg-white shadow-sm text-slate-800' : 'text-white hover:bg-white/10'}`}>Latin</button>
                                                <button onClick={() => setShowTrans(!showTrans)} className={`flex-1 py-2 rounded-[10px] text-[10px] font-bold transition-all ${showTrans ? 'bg-white shadow-sm text-slate-800' : 'text-white hover:bg-white/10'}`}>Arti</button>
                                            </div>
                                            <div className="flex shrink-0 p-1 rounded-[14px] gap-1 bg-white/20 shadow-inner backdrop-blur-sm">
                                                <button onClick={() => setFontType('uthmani')} className={`px-3 py-2 rounded-[10px] text-[10px] font-bold transition-all ${fontType === 'uthmani' ? 'bg-white shadow-sm text-slate-800' : 'text-white/80 hover:bg-white/10'}`}>Madinah</button>
                                                <button onClick={() => setFontType('kemenag')} className={`px-3 py-2 rounded-[10px] text-[10px] font-bold transition-all ${fontType === 'kemenag' ? 'bg-white shadow-sm text-slate-800' : 'text-white/80 hover:bg-white/10'}`}>Kemenag</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Banner Surah Minimalis */}
                        <div onClick={() => setShowSwitcher(true)} className="mx-6 mt-4 mb-4 rounded-[16px] py-4 px-4 text-center shadow-sm relative overflow-hidden cursor-pointer active:scale-95 transition-transform" style={{ backgroundColor: theme.hex }}>
                            <div className="absolute w-20 h-20 rounded-full bg-white/20 top-[-10px] left-[-10px] blur-[1px] anim-banner-polka" style={{animationDelay: '0s'}}></div>
                            <div className="absolute w-24 h-24 rounded-full bg-white/15 bottom-[-20px] right-[-20px] blur-sm anim-banner-polka" style={{animationDelay: '1s'}}></div>
                            <div className="absolute w-8 h-8 rounded-full bg-white/20 top-[40%] right-[20%] blur-[2px] anim-banner-polka" style={{animationDelay: '2.5s'}}></div>
                            
                            <h2 className="text-[26px] font-uthmani font-normal text-white mb-0 drop-shadow-sm relative z-10 leading-none">{activeSurah.ar}</h2>
                            <h3 className="font-black text-white text-[13px] uppercase tracking-widest relative z-10 mt-1 mb-0.5">{activeSurah.id}</h3>
                            <p className="text-[9px] font-bold text-white/90 mb-2 relative z-10 tracking-wide">{activeSurah.tr}</p>
                            <div className="bg-white/20 inline-block px-3 py-1 rounded-full relative z-10 backdrop-blur-sm">
                                <p className="text-[8px] font-bold text-white uppercase tracking-widest">{activeSurah.type} • {activeSurah.ay} Ayat</p>
                            </div>
                        </div>

                        {isFetching && !surahDetail && (
                            <div className="flex flex-col items-center justify-center py-10 opacity-70 animate-pulse">
                                <BookOpen size={24} className="mb-2" style={{ color: theme.hex }} />
                                <p className="text-[10px] font-bold tracking-widest uppercase" style={{ color: theme.hex }}>Menyelaraskan Mushaf...</p>
                            </div>
                        )}

                        {/* Pop-up Asbabun Nuzul */}
                        {showAsbabun && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in" onClick={() => setShowAsbabun(false)}>
                                <div className="bg-white w-full max-w-[340px] rounded-[24px] shadow-2xl p-6 relative" onClick={(e) => e.stopPropagation()}>
                                    <button onClick={() => setShowAsbabun(false)} className="absolute top-4 right-4 p-1.5 bg-slate-100 rounded-full text-slate-500 hover:bg-slate-200 active:scale-95 transition-all"><X size={16}/></button>
                                    <h3 className="font-black text-slate-800 text-[18px] mb-1">Asbabun Nuzul</h3>
                                    <p className="text-[10px] font-bold text-slate-500 mb-5">{activeSurah.id} • Kemenag RI</p>
                                    <div className="max-h-[60vh] overflow-y-auto pr-2 text-[11px] leading-loose text-slate-700 font-medium text-justify">
                                        <div dangerouslySetInnerHTML={{__html: surahDesc || "Info/Asbabun Nuzul tidak tersedia untuk Surah ini."}}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Pop-Up Tajwid Eksklusif */}
                        {activeTajweed && TAJWEED_INFO[activeTajweed.ruleClass] && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm animate-in fade-in" onClick={() => setActiveTajweed(null)}>
                                <div className="bg-[#1E293B] w-full max-w-[340px] rounded-[24px] shadow-2xl p-6 relative text-white border border-slate-700" onClick={(e) => e.stopPropagation()}>
                                    <button onClick={() => setActiveTajweed(null)} className="absolute top-4 right-4 p-1.5 bg-white/10 rounded-full text-white/70 hover:bg-white/20 active:scale-95 transition-all"><X size={16}/></button>
                                    
                                    <h3 className="font-black text-[18px] mb-3" style={{ color: TAJWEED_INFO[activeTajweed.ruleClass].color }}>
                                        {TAJWEED_INFO[activeTajweed.ruleClass].title}
                                    </h3>
                                    <p className="text-[11px] leading-loose font-medium text-slate-300 mb-5 text-justify">
                                        {TAJWEED_INFO[activeTajweed.ruleClass].desc}
                                    </p>

                                    <div className="bg-black/40 rounded-[16px] p-4 flex items-center justify-between border border-white/5 shadow-inner">
                                        <button onClick={(e) => {
                                                e.stopPropagation();
                                                if ('speechSynthesis' in window) {
                                                    const utterance = new SpeechSynthesisUtterance(activeTajweed.word);
                                                    utterance.lang = 'ar-SA';
                                                    window.speechSynthesis.speak(utterance);
                                                }
                                            }} 
                                            className="p-3 bg-white/10 rounded-full hover:bg-white/20 active:scale-95 transition-all shadow-sm flex-shrink-0"
                                        >
                                            <Play size={18} className="text-white ml-0.5" />
                                        </button>
                                        <span className={`text-[30px] font-uthmani font-normal drop-shadow-md text-right ml-4 tajweed-${activeTajweed.ruleClass}`} dir="rtl" style={{ lineHeight: '1.5' }}>
                                            {activeTajweed.word}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Switcher Navigasi */}
                        {showSwitcher && (
                            <div className="fixed inset-0 z-[60] flex flex-col justify-end bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200" onClick={() => setShowSwitcher(false)}>

        function DzikirView({ nav, theme }) {
            const [count, setCount] = useState(0);
            const [activeDzikir, setActiveDzikir] = useState(0);
            const [ripples, setRipples] = useState([]);
            const target = 33;
            
            const list = [
                { label: 'Subhanallah', ar: 'سُبْحَانَ اللَّهِ', color: '#14A895' }, 
                { label: 'Alhamdulillah', ar: 'الْحَمْدُ لِلَّهِ', color: '#3B82F6' },
                { label: 'Allahu Akbar', ar: 'اللَّهُ أَكْبَرُ', color: '#F97316' }  
            ];
            const currentDzikir = list[activeDzikir];
            
            const hour = new Date().getHours();
            const isNight = hour >= 18 || hour < 4;
            
            const themeConfig = isNight ? {
                bg: 'from-[#141E30] to-[#243B55]',
                celestialObj: 'bg-slate-100',
                celestialShadow: '#E2E8F0',
                isMoon: true,
                mountBack: ['#3A6073', '#16222A'],
                mountMid: ['#2C3E50', '#0f172a'],
                mountFront: ['#1e293b', '#020617'],
                water: ['#0F2027', '#203A43'],
            } : {
                bg: 'from-cyan-300 to-blue-500',
                celestialObj: 'bg-yellow-300',
                celestialShadow: '#FDE047',
                isMoon: false,
                mountBack: ['#38bdf8', '#2563eb'],
                mountMid: ['#2dd4bf', '#0284c7'],
                mountFront: ['#4ade80', '#059669'],
                water: ['#22d3ee', '#3b82f6'],
            };

            const progress = count / target;
            let celestialStyle = {};

            if (activeDzikir === 0) { 
                const scale = 0.4 + (progress * 0.6); 
                const opacity = 0.5 + (progress * 0.5);
                const x = -35 + (35 * progress); 
                const y = 15 - (45 * progress);  
                celestialStyle = { transform: `translate(${x}vw, ${y}vh) scale(${scale})`, opacity: opacity, boxShadow: `0 0 ${20 + (progress*30)}px ${themeConfig.celestialShadow}` };
            } else if (activeDzikir === 1) { 
                const pulseScale = 1.0 + (progress * 0.5); 
                const shadowIntensity = 50 + (progress * 80); 
                celestialStyle = { transform: `translate(0vw, -30vh) scale(${pulseScale})`, opacity: 1, boxShadow: `0 0 ${shadowIntensity}px ${themeConfig.celestialShadow}` };
            } else { 
                const scale = 1.0 - (progress * 0.6); 
                const opacity = 1.0 - (progress * 0.5);
                const x = 0 + (35 * progress); 
                const y = -30 + (45 * progress); 
                celestialStyle = { transform: `translate(${x}vw, ${y}vh) scale(${scale})`, opacity: opacity, boxShadow: `0 0 ${50 - (progress*30)}px ${themeConfig.celestialShadow}` };
            }

            const handleScreenTap = (e) => {
                const rect = e.currentTarget.getBoundingClientRect();
                const x = e.clientX - rect.left; const y = e.clientY - rect.top;
                
                const newRipple = { id: Date.now(), x, y };
                setRipples(prev => [...prev, newRipple]);
                setTimeout(() => setRipples(prev => prev.filter(p => p.id !== newRipple.id)), 600);

                if (count < target) { 
                    const next = count + 1;
                    setCount(next); 
                    if (navigator.vibrate) navigator.vibrate(30); 
                    
                    if (next === target) {
                        if (navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                        setTimeout(() => { setCount(0); setActiveDzikir(a => (a < list.length - 1 ? a + 1 : 0)); }, 700);
                    }
                }
            };

            return (
                <div className={`animate-in fade-in h-full w-full flex flex-col relative overflow-hidden select-none bg-gradient-to-b ${themeConfig.bg} transition-colors duration-1000 z-10`} onClick={handleScreenTap}>

        function MasjidView({ nav, theme, userLoc }) {
            const [masjids, setMasjids] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const getMasjids = async () => {
                    setLoading(true);
                    try {
                        const query = `[out:json];node(around:3000,${userLoc.lat},${userLoc.lon})[amenity=place_of_worship][religion=muslim];out 5;`;
                        const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                        const data = await res.json();
                        
                        const R = 6371; 
                        const results = data.elements.map(e => {
                            const dLat = (e.lat - userLoc.lat) * Math.PI / 180; const dLon = (e.lon - userLoc.lon) * Math.PI / 180;
                            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userLoc.lat * Math.PI / 180) * Math.cos(e.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                            const dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                            return { name: e.tags.name || 'Masjid Terdekat', dist: dist.toFixed(1) + ' km', raw: dist, lat: e.lat, lon: e.lon };
                        }).filter(e => e.name !== 'Masjid Terdekat').sort((a, b) => a.raw - b.raw).slice(0, 5);
                        
                        setMasjids(results.length > 0 ? results : [{name: 'Masjid Agung', dist: '1.5 km', lat: userLoc.lat, lon: userLoc.lon}]);
                    } catch(e) { setMasjids([{name: 'Masjid Agung', dist: '1.5 km', lat: userLoc.lat, lon: userLoc.lon}]); }
                    setLoading(false);
                }
                getMasjids();

        function QiblaView({ theme, nav, userLoc }) {
            const [heading, setHeading] = useState(0);
            const [qiblaInfo, setQiblaInfo] = useState({ dir: 294.6, dist: 8376 });

            const compassThemes = [
                { id: 'modern', label: 'Modern', bg: 'bg-[#F8FAFC]', border: 'border-slate-200', textN: 'text-slate-800', textOther: 'text-slate-400', needleColor: 'bg-emerald-500', isDark: false },
                { id: 'dark', label: 'Gelap', bg: 'bg-slate-900', border: 'border-slate-700', textN: 'text-white', textOther: 'text-slate-500', needleColor: 'bg-amber-500', isDark: true },
                { id: 'zamrud', label: 'Zamrud', bg: 'bg-[#0f4d38]', border: 'border-[#1b7355]', textN: 'text-amber-400', textOther: 'text-[#449176]', needleColor: 'bg-red-500', isDark: true },
                { id: 'gold', label: 'Emas', bg: 'bg-gradient-to-br from-amber-100 to-amber-300', border: 'border-amber-400', textN: 'text-amber-900', textOther: 'text-amber-700', needleColor: 'bg-slate-800', isDark: false }
            ];
            const [activeCompass, setActiveCompass] = useState(0);
            const ct = compassThemes[activeCompass];

            useEffect(() => {
                const handler = (e) => setHeading(e.webkitCompassHeading || Math.abs(e.alpha - 360) || 0); 
                window.addEventListener('deviceorientation', handler, true); 
                
                const latK = 21.422487 * (Math.PI / 180); const lonK = 39.826206 * (Math.PI / 180); 
                const latU = userLoc.lat * (Math.PI / 180); const lonU = userLoc.lon * (Math.PI / 180); 

                const y = Math.sin(lonK - lonU);
                const x = Math.cos(latU) * Math.tan(latK) - Math.sin(latU) * Math.cos(lonK - lonU);
                let qiblaDir = Math.atan2(y, x) * (180 / Math.PI); qiblaDir = (qiblaDir + 360) % 360;

                const R = 6371; const dLat = latK - latU; const dLon = lonK - lonU;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(latU) * Math.cos(latK) * Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); const dist = R * c;

                setQiblaInfo({ dir: qiblaDir, dist: dist });
                return () => window.removeEventListener('deviceorientation', handler, true); 
            }, [userLoc]);

            return (
                <div className="animate-in fade-in h-full flex flex-col bg-transparent relative z-10 overflow-hidden">

                                <span className={`absolute top-4 font-bold text-sm ${ct.textOther}`}>S</span>
                                <span className={`absolute bottom-4 font-black text-sm ${ct.textN}`}>N</span>
                                <span className={`absolute right-4 font-bold text-sm ${ct.textOther}`}>W</span>

                            <div className="absolute inset-0 transition-transform duration-100 z-10 flex justify-center" style={{ transform: `rotate(${qiblaInfo.dir - heading}deg)` }}>

                                <div>
