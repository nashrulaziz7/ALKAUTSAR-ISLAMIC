        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; margin: 0; }
        
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 35s linear infinite; }
        @keyframes pulse-glow { 0%, 100% { filter: drop-shadow(0 0 10px rgba(20,168,149,0.3)); } 50% { filter: drop-shadow(0 0 20px rgba(20,168,149,0.6)); } }
        .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
        @keyframes floatUp { 0% { transform: translateY(100px) scale(0); opacity: 0; } 50% { opacity: 0.6; } 100% { transform: translateY(-50px) scale(1.5); opacity: 0; } }
        .particle { position: absolute; background: white; border-radius: 50%; animation: floatUp linear infinite; pointer-events: none; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes bounce-soft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .animate-bounce-soft { animation: bounce-soft 2s ease-in-out infinite; }
        @keyframes shimmer { 0% { background-position: -1000px 0; } 100% { background-position: 1000px 0; } }
        .animate-shimmer { background: linear-gradient(to right, #f6f7f8 4%, #edeef1 25%, #f6f7f8 36%); background-size: 1000px 100%; animation: shimmer 2s infinite linear; }
        
        /* Animasi Polkadot Berkedip Lembut & Melayang */
        @keyframes float-polka {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.15; }
            50% { transform: translateY(-8px) scale(1.3); opacity: 0.6; }
        }
        .polka-dot { position: absolute; background-color: white; border-radius: 50%; animation: float-polka 4s ease-in-out infinite; pointer-events: none; }

        .font-uthmani { font-family: 'Amiri', serif; line-height: 2.3; }
        .font-indopak { font-family: 'Scheherazade New', serif; line-height: 2.0; font-size: 1.1em; }
        .font-kemenag { font-family: 'Lateef', serif; line-height: 1.9; font-size: 1.2em; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

                        setIsScrolled(false);
                    }
                };
                if (scrollContainer) {
                    scrollContainer.addEventListener('scroll', handleScroll);
                    handleScroll(); 
                }
                return () => {
                    if (scrollContainer) scrollContainer.removeEventListener('scroll', handleScroll);
                };
            }, [activeSurah]);

            // SISTEM AUDIO ANTI-MACET (DENGAN PROMISE CATCH)
            const playAyahSequence = (ayahNum, passedAyahObj = null) => {
                const targetAyah = passedAyahObj || (surahDetailRef.current ? surahDetailRef.current.find(a => a.numberInSurah === ayahNum) : null);
                if (!targetAyah) return;

                const needsBismillah = ayahNum === 1 && activeSurahRef.current?.n !== 1 && activeSurahRef.current?.n !== 9;
                const qariId = QARI_MAP[qari] || '01';
                
                setPlayingAyah(ayahNum);

                const playSafe = (src) => {
                    audioRef.current.src = src;
                    audioRef.current.load();
                    const playPromise = audioRef.current.play();
                    
                    if (playPromise !== undefined) {
                        playPromise.catch(error => {
                            console.warn("Audio play interrupted or failed:", error);
                            // Jika Bismillah Error (404), langsung lompat baca ayatnya agar tidak macet!
                            if (playingPartRef.current === 'bismillah') {
                                setPlayingPart('ayah');
                                playSafe(targetAyah.audio[qariId] || targetAyah.audio['01']);
                            } else {
                                // Jika ayat juga error, matikan status play
                                setPlayingAyah(null);
                                setPlayingPart(null);
                                setIsPlayAll(false);
                            }
                        });
                    }
                };

                if (needsBismillah) {
                    setPlayingPart('bismillah');
                    playSafe(BISMILLAH_AUDIO[qariId] || BISMILLAH_AUDIO['01']);
                } else {
                    setPlayingPart('ayah');
                    playSafe(targetAyah.audio[qariId] || targetAyah.audio['01']);
                }
            };

            useEffect(() => {
                const handleAudioEnded = () => {
                    if (!playingAyahRef.current || !surahDetailRef.current) return;
                    const currentNum = playingAyahRef.current;
                    const currentPart = playingPartRef.current;
                    
                    if (currentPart === 'bismillah') {
                        setPlayingPart('ayah');
                        const qariId = QARI_MAP[qari] || '01';
                        const aObj = surahDetailRef.current.find(a => a.numberInSurah === currentNum);
                        if (aObj) {
                            audioRef.current.src = aObj.audio[qariId] || aObj.audio['01'];
                            const playPromise = audioRef.current.play();
                            if(playPromise !== undefined) playPromise.catch(e => console.warn("Skip audio error:", e));
                        }
                    } else {
                        if (isPlayAllRef.current && activeSurahRef.current && currentNum < activeSurahRef.current.ay) {
                            const nextAyahNum = currentNum + 1;
                            setPlayingAyah(nextAyahNum);
                            setPlayingPart('ayah'); 
                            
                            const qariId = QARI_MAP[qari] || '01';
                            const nextAObj = surahDetailRef.current.find(a => a.numberInSurah === nextAyahNum);
                            
                            if (nextAObj) {
                                audioRef.current.src = nextAObj.audio[qariId] || nextAObj.audio['01'];
                                const playPromise = audioRef.current.play();
                                if(playPromise !== undefined) playPromise.catch(e => console.warn("Skip audio error:", e));
                                scrollToAyah(nextAyahNum);
                            }
                        } else {
                            setPlayingAyah(null);
                            setPlayingPart(null);
                            setIsPlayAll(false);
                        }
                    }
                };
                const audioEl = audioRef.current;
                audioEl.addEventListener('ended', handleAudioEnded);
                return () => {
                    if (audioEl) { audioEl.removeEventListener('ended', handleAudioEnded); audioEl.pause(); }
                };
            }, [qari]);

            useEffect(() => {
                if (navParams && navParams.surahId) {
                    const targetSurah = SURAHS_DB.find(s => s.n === navParams.surahId);
                    if(targetSurah) openSurah(targetSurah);
                }
            }, [navParams]);

            const filteredSurahs = SURAHS_DB.filter(s => s.id.toLowerCase().includes(search.toLowerCase()) || s.n.toString() === search);

            const fetchWithTimeout = (url, options, timeout = 8000) => {
                return Promise.race([
                    fetch(url, options),
                    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), timeout))
                ]);
            };

            const openSurah = async (surah) => {
                setActiveSurah(surah); 
                setLoading(true);
                setSurahDetail(null);
                setOpenedTafsir(null);
                setShowSwitcher(false);
                setShowSettings(false);
                setIsPlayAll(false);
                setShowAsbabun(false);
                setActiveTajweed(null);
                
                try {
                    const [resKemenag, resTafsirKemenag, resTafsirJalalayn, resGithub] = await Promise.allSettled([
                        fetchWithTimeout(`https://equran.id/api/v2/surat/${surah.n}`),
                        fetchWithTimeout(`https://equran.id/api/v2/tafsir/${surah.n}`),
                        fetchWithTimeout(`https://api.alquran.cloud/v1/surah/${surah.n}/id.jalalayn`),
                        fetchWithTimeout(`https://raw.githubusercontent.com/nashrulaziz7/quran-data/main/${surah.n}.json`)
                    ]);

                    let dataKemenag = null;
                    let dataTafsirKemenag = null;
                    let dataTafsirJalalayn = null;
                    let tajweedData = [];

                    if (resKemenag.status === 'fulfilled' && resKemenag.value.ok) {
                        dataKemenag = await resKemenag.value.json();
                        setSurahDesc(dataKemenag.data.deskripsi);
                    } else {
                        throw new Error("Gagal mengambil teks Kemenag");
                    }

                    if (resTafsirKemenag.status === 'fulfilled' && resTafsirKemenag.value.ok) {
                        dataTafsirKemenag = await resTafsirKemenag.value.json();
                    }

                    if (resTafsirJalalayn.status === 'fulfilled' && resTafsirJalalayn.value.ok) {
                        dataTafsirJalalayn = await resTafsirJalalayn.value.json();
                    }

                    if (resGithub.status === 'fulfilled' && resGithub.value.ok) {
                        tajweedData = await resGithub.value.json();
                    }

                    const mergedAyahs = dataKemenag.data.ayat.map((a, index) => {
                         const githubAyah = tajweedData.find(g => g.aya_number === a.nomorAyat) || {};
                         const tKemenag = dataTafsirKemenag?.data?.tafsir?.find(t => t.ayat === a.nomorAyat)?.teks || "Tafsir Kemenag tidak tersedia untuk ayat ini.";
                         const tJalalayn = dataTafsirJalalayn?.data?.ayahs?.[index]?.text || "Tafsir Jalalayn tidak tersedia untuk ayat ini.";

                         return {
                             numberInSurah: a.nomorAyat,
                             text: githubAyah.aya_text || a.teksArab,
                             latin: a.teksLatin,
                             trans: a.teksIndonesia,
                             audio: a.audio,
                             tajweedRules: githubAyah.tajweed || [],
                             tafsirKemenag: tKemenag,
                             tafsirJalalayn: tJalalayn
                         };
                    });

                    setSurahDetail(mergedAyahs);
                } catch (err) {
                    setSurahDetail([{numberInSurah: 1, text: "Gagal memuat ayat.", latin: "", trans: "Harap periksa koneksi internet Anda.", audio: {"01": ""}, tajweedRules: [], tafsirKemenag: "Gagal memuat.", tafsirJalalayn: "Gagal Memuat."}]);
                }
                setLoading(false);
            };

            const scrollToAyah = (ayahNum) => {
                 const el = document.getElementById(`ayah-${ayahNum}`);
                 if(el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    const originalBg = el.style.backgroundColor;
                    el.style.backgroundColor = theme.light;
                    el.style.transition = 'background-color 0.5s ease';
                    setTimeout(() => { el.style.backgroundColor = originalBg; }, 2000);
                 }
                 setShowSwitcher(false);
            };

            const handleCopyText = (text) => {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                try { document.execCommand('copy'); } catch (err) { console.error('Fallback Copy Error', err); }
                document.body.removeChild(textArea);
            };

            const renderArabicWithTajweed = (text, rules) => {
                if (!showTajwid || !rules || rules.length === 0 || !text) return text;
                let elements = [];
                let lastIndex = 0;
                const sortedRules = [...rules].sort((a, b) => a.start - b.start);

                sortedRules.forEach((rule, idx) => {
                    if (rule.start > lastIndex) {
                        elements.push(<span key={`plain-${idx}`}>{text.slice(lastIndex, rule.start)}</span>);
                    }
                    elements.push(
                        <span 
                            key={`tajweed-${idx}`} 
                            className={`tajweed-${rule.class} cursor-pointer hover:opacity-80 border-b border-transparent hover:border-current transition-all`}
                            onClick={(e) => {
                                e.preventDefault();
                                e.stopPropagation();
                                setActiveTajweed({
                                    ruleClass: rule.class,
                                    word: text.slice(rule.start, rule.end)
                                });
                            }}
                        >
                            {text.slice(rule.start, rule.end)}
                        </span>
                    );
                    lastIndex = rule.end;
                });

                if (lastIndex < text.length) {
                    elements.push(<span key={`plain-end`}>{text.slice(lastIndex)}</span>);
                }
                return elements;
            };

            if (activeSurah) {
                return (
                    <div className="pb-20 bg-slate-50 min-h-full animate-in fade-in relative">
                        {/* Header Pintar Sticky & Menu Settings Padat */}
                        <div className="sticky top-0 z-40 w-full transition-all duration-300 shadow-sm" style={{ backgroundColor: theme.hex }}>
                            <div className="flex items-center justify-between px-3 py-3 h-14">
                                <div className="flex items-center gap-3 flex-1 min-w-0">
                                    <button onClick={() => {
                                        setActiveSurah(null);
                                        if (audioRef.current) {
                                            audioRef.current.pause();
                                            audioRef.current.removeAttribute('src'); 
                                            audioRef.current.load();
                                        }
                                        setPlayingAyah(null);
                                        setPlayingPart(null);
                                        setIsPlayAll(false);
                                    }} className="p-2 rounded-xl transition-all text-white hover:bg-white/10 active:scale-95 shrink-0">
                                        <ArrowLeft size={18} />
                                    </button>

                                    <div className={`cursor-pointer transition-all duration-300 flex flex-col justify-center truncate ${isScrolled ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-2 pointer-events-none absolute'}`} onClick={() => setShowSwitcher(true)}>
                                        <h2 className="font-black text-[14px] text-white tracking-tight truncate leading-tight">{activeSurah.n}. {activeSurah.id}</h2>
                                        <p className="text-[9px] font-medium text-white/80 truncate">{activeSurah.type} • {activeSurah.ay} Ayat</p>
                                    </div>
                                </div>

                                <div className="flex items-center gap-1 shrink-0 text-white">
                                    <button onClick={() => setIsPageMode(!isPageMode)} className={`p-2 rounded-xl transition-all hover:bg-white/10 active:scale-95 ${isPageMode ? 'bg-white/20' : ''}`}>
                                        {isPageMode ? <BookOpen size={18} /> : <LayoutGrid size={18} />}
                                    </button>
                                    <button onClick={() => setShowAsbabun(true)} className="p-2 rounded-xl transition-all hover:bg-white/10 active:scale-95">
                                        <Info size={18} />
                                    </button>
                                    <button onClick={() => {
                                        if (isPlayAll) {
                                            setIsPlayAll(false);
                                            if (!audioRef.current.paused) audioRef.current.pause();
                                            setPlayingAyah(null);
                                            setPlayingPart(null);
                                        } else {
                                            setIsPlayAll(true);
                                            if (!surahDetail || surahDetail.length === 0) return;
                                            playAyahSequence(1);
                                            scrollToAyah(1);
                                        }
                                    }} className={`p-2 rounded-xl transition-all hover:bg-white/10 active:scale-95 ${isPlayAll ? 'bg-white/20 text-yellow-300' : ''}`}>
                                        {isPlayAll ? <Pause size={18} /> : <ListMusic size={18} />}
                                    </button>
                                    <button onClick={() => setShowSettings(!showSettings)} className={`p-2 rounded-xl transition-all hover:bg-white/10 active:scale-95 ${showSettings ? 'bg-white/20' : ''}`}>
                                        <Settings2 size={18} />
                                    </button>
                                </div>
                            </div>

                            {showSettings && (
                                <div className="px-3 pb-3 pt-1 border-t border-white/10 animate-in slide-in-from-top-2">
                                    <div className="flex flex-col gap-2">
                                        <div className="flex gap-2">
                                            <div className="flex items-center bg-white/10 rounded-lg p-1 w-28 shrink-0">
                                                <span className="text-[9px] font-bold text-white/70 ml-1.5 flex-1">Ukuran</span>
                                                <button onClick={() => setFontSize(Math.max(20, fontSize - 4))} className="w-6 h-6 bg-white rounded shadow-sm text-gray-700 font-bold active:scale-95 text-xs">-</button>
                                                <span className="text-[10px] font-bold text-white w-5 text-center">{fontSize}</span>
                                                <button onClick={() => setFontSize(Math.min(48, fontSize + 4))} className="w-6 h-6 bg-white rounded shadow-sm text-gray-700 font-bold active:scale-95 text-xs">+</button>
                                            </div>
                                            <select value={qari} onChange={e => { setQari(e.target.value); if(!audioRef.current.paused) audioRef.current.pause(); setPlayingAyah(null); }} className="flex-1 bg-white border-0 px-2 py-1.5 rounded-lg text-[10px] font-bold text-gray-700 outline-none shadow-sm">
                                                {QARI_LIST.map(q => <option key={q.id} value={q.id}>{q.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex gap-2">
                                            <div className="flex bg-white/10 p-1 rounded-lg flex-1">
                                                <button onClick={() => setShowTajwid(!showTajwid)} className={`flex-1 py-1.5 text-[9px] font-bold rounded-md transition-colors ${showTajwid ? 'bg-white shadow-sm text-gray-800' : 'text-white/60 hover:text-white'}`}>Tajwid</button>
                                                <button onClick={() => setShowLatin(!showLatin)} className={`flex-1 py-1.5 text-[9px] font-bold rounded-md transition-colors ${showLatin ? 'bg-white shadow-sm text-gray-800' : 'text-white/60 hover:text-white'}`}>Latin</button>
                                                <button onClick={() => setShowTrans(!showTrans)} className={`flex-1 py-1.5 text-[9px] font-bold rounded-md transition-colors ${showTrans ? 'bg-white shadow-sm text-gray-800' : 'text-white/60 hover:text-white'}`}>Arti</button>
                                            </div>
                                            <div className="flex bg-white/10 p-1 rounded-lg w-32 shrink-0">
                                                <button onClick={() => setFontType('uthmani')} className={`flex-1 py-1.5 text-[9px] font-bold rounded-md transition-colors ${fontType === 'uthmani' ? 'bg-white shadow-sm text-gray-800' : 'text-white/60 hover:text-white'}`}>Madinah</button>
                                                <button onClick={() => setFontType('kemenag')} className={`flex-1 py-1.5 text-[9px] font-bold rounded-md transition-colors ${fontType === 'kemenag' ? 'bg-white shadow-sm text-gray-800' : 'text-white/60 hover:text-white'}`}>Kemenag</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Banner Surah Minimalis & Elegan */}
                        <div onClick={() => setShowSwitcher(true)} className="mx-4 mt-5 rounded-[24px] p-6 text-center shadow-md relative overflow-hidden cursor-pointer active:scale-95 transition-transform" style={{ background: `linear-gradient(135deg, ${theme.hex}, ${theme.hex}ee)` }}>
                            <div className="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
                            {/* Animasi Polkadot Berkedip */}
                            <div className="polka-dot w-2 h-2 top-6 left-6" style={{ animationDelay: '0s' }}></div>
                            <div className="polka-dot w-3 h-3 bottom-6 left-12" style={{ animationDelay: '1.5s' }}></div>
                            <div className="polka-dot w-1.5 h-1.5 top-8 right-10" style={{ animationDelay: '2s' }}></div>
                            <div className="polka-dot w-2.5 h-2.5 bottom-8 right-8" style={{ animationDelay: '3.5s' }}></div>
                            <div className="polka-dot w-2 h-2 top-1/2 left-4" style={{ animationDelay: '1s' }}></div>
                            <div className="polka-dot w-1.5 h-1.5 top-1/2 right-12" style={{ animationDelay: '2.5s' }}></div>

                            <h2 className="text-[36px] font-uthmani text-white mb-1.5 drop-shadow-md relative z-10">{activeSurah.ar}</h2>
                            <h3 className="font-black text-white text-[15px] uppercase tracking-widest relative z-10">{activeSurah.id}</h3>
                            <p className="text-[10px] font-bold text-white/80 mb-3 relative z-10">{activeSurah.tr}</p>
                            <div className="bg-white/20 inline-block px-4 py-1.5 rounded-full relative z-10 border border-white/10">
                                <p className="text-[9px] font-bold text-white uppercase tracking-wider">{activeSurah.type} • {activeSurah.ay} Ayat</p>
                            </div>
                        </div>

                        {/* Modal Asbabun Nuzul */}
                        {showAsbabun && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in" onClick={() => setShowAsbabun(false)}>
                                <div className="bg-white w-full max-w-[340px] rounded-[24px] shadow-2xl p-6 relative" onClick={(e) => e.stopPropagation()}>
                                    <button onClick={() => setShowAsbabun(false)} className="absolute top-4 right-4 p-1.5 bg-gray-100 rounded-full text-gray-500 active:scale-95"><X size={16}/></button>
                                    <h3 className="font-black text-gray-800 text-[18px] mb-1">Asbabun Nuzul</h3>
                                    <p className="text-[10px] font-bold text-gray-500 mb-5">{activeSurah.id} • Kemenag RI</p>
                                    <div className="max-h-[60vh] overflow-y-auto pr-2 text-[12px] leading-relaxed text-gray-700 font-medium text-justify">
                                        <div dangerouslySetInnerHTML={{__html: surahDesc || "Info/Asbabun Nuzul tidak tersedia untuk Surah ini."}}></div>
                                    </div>
                                    <p className="text-[10px] text-gray-400 italic mt-4 border-t border-gray-100 pt-3">(Tafsir utuh tersedia di mode per-ayat)</p>
                                </div>
                            </div>
                        )}

                        {/* Modal Pop-up Penjelasan Tajwid Ekstra Elegan (Kata yang Di Klik) */}
                        {activeTajweed && TAJWEED_INFO[activeTajweed.ruleClass] && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in" onClick={() => setActiveTajweed(null)}>
                                <div className="bg-[#1E293B] w-full max-w-[340px] rounded-[24px] shadow-2xl p-6 relative text-white border border-white/10" onClick={(e) => e.stopPropagation()}>
                                    <button onClick={() => setActiveTajweed(null)} className="absolute top-4 right-4 p-1.5 bg-white/10 rounded-full text-white/70 hover:bg-white/20 active:scale-95 transition-all"><X size={16}/></button>
                                    
                                    <h3 className="font-black text-[18px] mb-3" style={{ color: TAJWEED_INFO[activeTajweed.ruleClass].color }}>
                                        {TAJWEED_INFO[activeTajweed.ruleClass].title}
                                    </h3>
                                    
                                    <p className="text-[12px] leading-relaxed font-medium text-gray-300 mb-5 text-justify">
                                        {TAJWEED_INFO[activeTajweed.ruleClass].desc}
                                    </p>

                                    <div className="bg-black/30 rounded-xl p-4 flex items-center justify-between mb-4 border border-white/5">
                                        <button 
                                            onClick={(e) => {
                                                e.stopPropagation();
                                                if ('speechSynthesis' in window) {
                                                    const utterance = new SpeechSynthesisUtterance(activeTajweed.word);
                                                    utterance.lang = 'ar-SA';
                                                    window.speechSynthesis.speak(utterance);

                                                    alert("Browser Anda tidak mendukung Web Speech API untuk suara Arab.");
                                                }

                                            className="p-3 bg-white/10 rounded-full hover:bg-white/20 active:scale-95 transition-all shadow-sm"
                                        >
                                            <Play size={22} className="text-white shrink-0" />
                                        </button>
                                        <span className={`text-4xl font-uthmani drop-shadow-md text-right ml-4 tajweed-${activeTajweed.ruleClass}`} dir="rtl">
                                            {activeTajweed.word}
                                        </span>
                                    </div>

                                    <div className="flex justify-between items-center text-[10px] text-gray-400 font-bold border-t border-white/10 pt-4 mt-2 cursor-pointer hover:text-white transition-colors" onClick={() => setActiveTajweed(null)}>
                                        <span>Lihat semua Hukum Tajwid</span>
                                        <ChevronRight size={14} />
                                    </div>
                                </div>
                            </div>

                        {/* Modal Navigasi Pintar (Switcher) */}
                        {showSwitcher && (
                            <div className="fixed inset-0 z-[60] flex flex-col justify-end bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
                                <div className="bg-white w-full h-[75dvh] max-w-[390px] mx-auto rounded-t-[32px] shadow-2xl flex flex-col animate-in slide-in-from-bottom-8 duration-300">
                                    <div className="flex items-center justify-between p-5 border-b border-gray-100">
                                        <div>
                                            <h3 className="font-black text-gray-800 text-[16px]">Navigasi Cepat</h3>
                                            <p className="text-[10px] font-bold text-gray-500">Lompat ke Surah atau Ayat</p>
                                        </div>
                                        <button onClick={() => setShowSwitcher(false)} className="p-2 bg-gray-100 rounded-full text-gray-500 active:scale-95"><X size={16}/></button>
                                    </div>
                                    
                                    <div className="flex p-3 gap-2 border-b border-gray-50">
                                        <button onClick={() => setSwitcherTab('surah')} className={`flex-1 py-2.5 rounded-xl text-[12px] font-bold transition-all ${switcherTab === 'surah' ? 'text-white shadow-sm' : 'bg-gray-100 text-gray-500'}`} style={switcherTab === 'surah' ? { backgroundColor: theme.hex } : {}}>Pilih Surah</button>
                                        <button onClick={() => setSwitcherTab('ayah')} className={`flex-1 py-2.5 rounded-xl text-[12px] font-bold transition-all ${switcherTab === 'ayah' ? 'text-white shadow-sm' : 'bg-gray-100 text-gray-500'}`} style={switcherTab === 'ayah' ? { backgroundColor: theme.hex } : {}}>Pilih Ayat</button>
                                    </div>

                                    <div className="flex-1 overflow-y-auto p-4">
                                        {switcherTab === 'surah' ? (
                                            <div className="space-y-2 pb-10">
                                                {SURAHS_DB.map((s) => (
                                                    <button key={s.n} onClick={() => openSurah(s)} className={`w-full p-3.5 rounded-[16px] flex items-center justify-between transition-all text-left ${activeSurah.n === s.n ? 'ring-2 shadow-sm' : 'bg-gray-50 hover:bg-gray-100'}`} style={activeSurah.n === s.n ? { backgroundColor: theme.light, ringColor: theme.hex } : {}}>
                                                        <div className="flex items-center gap-3">
                                                            <div className="w-8 h-8 flex items-center justify-center rounded-[10px] bg-white text-gray-800 font-bold text-[10px] shadow-sm">{s.n}</div>
                                                            <div><h3 className={`font-bold text-[13px] ${activeSurah.n === s.n ? 'text-gray-900' : 'text-gray-700'}`}>{s.id}</h3></div>
                                                        </div>
                                                        <div className="text-lg font-bold font-uthmani" style={{ color: activeSurah.n === s.n ? theme.hex : '#9CA3AF' }}>{s.ar}</div>
                                                    </button>
                                                ))}
                                            </div>
                                        ) : (

                                                {Array.from({ length: activeSurah.ay }, (_, i) => i + 1).map(num => (
                                                    <button key={num} onClick={() => scrollToAyah(num)} className="aspect-square bg-gray-50 hover:bg-gray-100 rounded-2xl flex items-center justify-center font-bold text-[13px] text-gray-700 transition-all active:scale-95 border border-gray-100 shadow-sm" style={{ color: theme.hex }}>

        function ChatView({ nav, theme }) {
            const [messages, setMessages] = useState([{ role: 'model', text: "Wa'alaikumussalam! 👋 Aku asisten AI Tarjih. Lagi mau nanya hukum agama, atau cuma mau curhat tipis-tipis? Sini aku bantu jawab sesuai HPT Muhammadiyah." }]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const endRef = useRef(null);

            useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;
                setMessages(prev => [...prev, { role: 'user', text: input }]);
                const userText = input.toLowerCase(); setInput(''); setLoading(true);
                
                setTimeout(() => {
                    let reply = "";
                    if (userText.match(/assalamu|salam|halo|hai|pagi|siang|sore|malam/)) {
                        reply = "Wa'alaikumussalam warahmatullah! Halo bro! Gimana harimu? Jangan lupa sholatnya dijaga ya.";
                    } else if (userText.match(/lapar|makan|haus|ngantuk|capek/)) {
                        reply = "Waduh, kalau kebutuhan fisik harus dipenuhi dulu bro biar ibadahnya khusyuk. Jangan lupa baca bismillah ya! 😄";
                    } else if (userText.match(/sedih|galau|bingung|nangis|kecewa/)) {
                        reply = "Sabar ya bro. Allah itu selalu dekat kok (Al-Baqarah: 186). Coba wudhu dan sholat dua rakaat, insyaAllah hatinya lebih tenang. Semangat! 😊";
                    } else if (userText.match(/hukum|bolehkah|apa dalil|wajib|sunnah|haram/)) {
                        reply = "Kalo menurut HPT Muhammadiyah, dalam urusan ibadah kita harus berpegang teguh sama dalil yang shahih (Quran/Sunnah). Kalau urusan muamalah (dunia), pada dasarnya mubah (boleh) kok selama nggak ada dalil yang melarangnya. Gimana detail pertanyaannya?";
                    } else {
                        reply = "Menarik tuh bro! Btw, aku asisten tarjih nih, jadi senengnya bahas seputar agama, amalan, atau jadi tempat ngingetin kebaikan. Ada hal lain yang mau di-share?";

                    setMessages(prev => [...prev, { role: 'model', text: reply }]);
                    setLoading(false);
                }, 1200);
            };

            return (

        function DzikirView({ nav }) {
            const [count, setCount] = useState(0);
            const [activeDzikir, setActiveDzikir] = useState(0);
            const target = 33;
            
            const list = [
                { label: 'Subhanallah', ar: 'سُبْحَانَ اللَّهِ', color: '#14A895', light: '#E6F4F1' }, 
                { label: 'Alhamdulillah', ar: 'الْحَمْدُ لِلَّهِ', color: '#3B82F6', light: '#EFF6FF' },

            ];

            const currentTheme = list[activeDzikir];

            const handleTap = () => {
                if (count < target - 1) {
                    setCount(c => c + 1);
                    if (navigator.vibrate) navigator.vibrate(30);

                    setCount(0); 
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

                        setActiveDzikir(0);

            };

            return (

                    <div className="flex gap-2 overflow-x-auto scrollbar-hide mb-8">
                        {list.map((d, i) => (
                            <button key={i} onClick={() => { setActiveDzikir(i); setCount(0); }} className="px-4 py-3 rounded-xl font-bold text-xs whitespace-nowrap transition-all shadow-sm" style={activeDzikir === i ? { backgroundColor: d.color, color: 'white' } : { backgroundColor: 'white', color: '#64748B', border: '1px solid #F1F5F9' }}>
                                {d.label}
                            </button>
                        ))}
                    </div>

                    <div className="bg-white rounded-[24px] p-6 text-center shadow-sm border border-gray-100 mb-8 transition-colors duration-500">
                        <h2 className="text-[40px] font-uthmani text-gray-800 mb-2 leading-relaxed">{currentTheme.ar}</h2>
                        <p className="text-xs font-bold transition-colors duration-500" style={{ color: currentTheme.color }}>{currentTheme.label}</p>
                    </div>

                    <div className="mt-auto mb-20 flex flex-col items-center">
                        <div className="relative w-[240px] h-[240px] flex justify-center items-center cursor-pointer active:scale-95 active:shadow-inner rounded-full transition-all duration-100 bg-white shadow-2xl border-[6px] border-gray-50" onClick={handleTap}>
                            <svg className="absolute inset-0 w-full h-full transform -rotate-90">
                                <circle cx="120" cy="120" r="100" fill="none" stroke="#F1F5F9" strokeWidth="14" />
                                <circle cx="120" cy="120" r="100" fill="none" stroke={currentTheme.color} strokeWidth="14" strokeDasharray={`${2 * Math.PI * 100}`} strokeDashoffset={`${2 * Math.PI * 100 * (1 - (count/target))}`} strokeLinecap="round" className="transition-all duration-300" />
                            </svg>
                            <div className="text-center">
                                <div className="text-[72px] font-black text-gray-800 tracking-tighter drop-shadow-sm select-none">{count}</div>
                                <div className="text-[10px] font-bold text-gray-500 mt-2 uppercase tracking-widest text-center mx-auto bg-gray-100 px-4 py-1.5 rounded-full shadow-inner">Ketuk Jempol</div>
                            </div>
                        </div>
                        
                        <button onClick={() => setCount(0)} className="mt-10 px-8 py-3.5 bg-white rounded-full shadow-sm text-[11px] font-bold text-red-500 border border-red-100 flex items-center gap-2 active:scale-95 uppercase tracking-wider hover:bg-red-50 transition-colors">
                            <RotateCcw size={14}/> Reset
                        </button>
                    </div>
                </div>
            );
        }

        function QiblaView({ theme, nav }) {
            const [heading, setHeading] = useState(0);
            useEffect(() => { const handler = (e) => setHeading(e.webkitCompassHeading || Math.abs(e.alpha - 360) || 0); window.addEventListener('deviceorientation', handler, true); return () => window.removeEventListener('deviceorientation', handler, true); }, []);

            return (
                <div className="px-5 pt-8 pb-10 animate-in fade-in h-[100dvh]">
                    <div className="flex items-center gap-3 mb-6">
                        <button onClick={()=>nav('home')} className="p-2.5 rounded-[14px]" style={{ backgroundColor: theme.light, color: theme.hex }}><ArrowLeft size={20} /></button>
                        <h1 className="text-2xl font-black text-gray-800 tracking-tight">Arah Kiblat</h1>
                    </div>
                    <div className="relative flex justify-center items-center w-64 h-64 mx-auto mb-10 mt-10">
                        <div className="absolute inset-0 rounded-full border-[8px] border-white shadow-xl flex items-center justify-center transition-transform duration-100 bg-[#F4F9F9]" style={{ transform: `rotate(${-heading}deg)` }}>
                            <span className="absolute top-4 font-bold text-gray-400 text-sm">S</span><span className="absolute bottom-4 font-black text-sm" style={{ color: theme.hex }}>N</span><span className="absolute right-4 font-bold text-gray-400 text-sm">W</span><span className="absolute left-4 font-bold text-gray-400 text-sm">E</span>
                            <div className="absolute inset-2 rounded-full border border-dashed border-gray-300"></div>
                        </div>
                        <div className="w-4 h-4 bg-amber-500 rounded-full z-10 shadow-md ring-2 ring-white"></div>
                        <div className="absolute inset-0 transition-transform duration-100 z-10 flex justify-center" style={{ transform: `rotate(${294.6 - heading}deg)` }}>
                            <div className="mt-8">
                                <div className="w-12 h-12 rounded-full flex items-center justify-center shadow-lg" style={{ backgroundColor: theme.light }}>
                                    <div className="w-6 h-7 bg-slate-900 rounded-[2px] border border-amber-400 flex items-center"><div className="w-full h-[2px] bg-amber-400 mt-1"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div className="grid grid-cols-2 gap-3 mt-20">
                        <div className="col-span-2 bg-white p-4 rounded-[20px] shadow-sm"><p className="text-[10px] font-bold mb-1 flex items-center gap-1" style={{ color: theme.hex }}><MapPin size={12}/> Lokasi Anda</p><p className="text-sm font-bold text-gray-800">Kecamatan Ngawen, Kabupaten Klaten, Indonesia</p></div>
                        <div className="bg-white p-4 rounded-[20px] shadow-sm"><p className="text-[10px] font-bold mb-1" style={{ color: theme.hex }}>Arah Kiblat</p><p className="text-lg font-black text-gray-800">294.6°</p></div>
                        <div className="bg-white p-4 rounded-[20px] shadow-sm"><p className="text-[10px] font-bold text-amber-500 mb-1">Jarak Ka'bah</p><p className="text-lg font-black text-gray-800">8376.1km</p></div>
                    </div>
                </div>
            );
        }

        function MaktabahView({ nav, theme }) {
            const pdfUrl = "https://raw.githubusercontent.com/nashrulaziz7/quran-data/main/Terjemah%20Tafsir%20Jalalain%2030%20Juz.pdf";
            const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`;

            return (
                <div className="animate-in fade-in h-[100dvh] flex flex-col bg-slate-50">
                    <div className="bg-white px-5 py-4 flex items-center justify-between shadow-sm z-30">
                        <div className="flex items-center">
                            <button onClick={() => nav('home')} className="p-2 rounded-xl bg-gray-100 mr-3 active:scale-95 transition-transform"><ArrowLeft size={18} /></button>
                            <div>
                                <h1 className="text-[15px] font-black text-gray-800 tracking-tight">Maktabah</h1>
                                <p className="text-[10px] font-bold" style={{ color: theme.hex }}>Tafsir Jalalain 30 Juz</p>
                            </div>
                        </div>
                        <a href={pdfUrl} target="_blank" rel="noreferrer" className="p-2 bg-gray-100 rounded-xl text-gray-600 active:scale-95 transition-transform hover:bg-gray-200">
                            <Download size={18} />
                        </a>
                    </div>
                    <div className="flex-1 w-full bg-gray-200">
                        <iframe 
                            src={viewerUrl} 
                            className="w-full h-full border-none"
                            title="Tafsir Jalalain PDF Reader"
                        />
                    </div>
                </div>
            );
        }

        function SettingsView({ nav, theme, setTheme }) {
            const Section = ({ title, icon, children }) => (
                <div className="mb-6">
                    <h3 className="text-[13px] font-bold text-gray-700 flex items-center gap-2 mb-3 px-1">
                        <span style={{ color: theme.hex }}>{icon}</span> {title}
                    </h3>
                    <div className="bg-white rounded-[20px] p-2 shadow-sm border border-gray-100">
                        {children}
                    </div>
                </div>
            );

            return (
                <div className="pb-10 animate-in slide-in-from-right-4">
                    <div className="sticky top-0 bg-[#F4F9F9]/95 backdrop-blur-md px-5 pt-8 pb-4 flex items-center z-30 shadow-sm border-b border-gray-100">
                        <button onClick={() => nav('home')} className="p-2 rounded-xl bg-gray-800 text-white mr-4 active:scale-95"><ArrowLeft size={18} /></button>
                        <h1 className="text-[18px] font-black text-gray-800 tracking-tight flex items-center gap-2">
                            <Settings size={22} style={{ color: theme.hex }} /> Pengaturan
                        </h1>
                    </div>

                    <div className="p-5">
                        <Section title="Tampilan & Tema Warna" icon={<Palette size={18}/>}>
                            <p className="text-[10px] font-bold text-gray-400 mb-2 px-2 uppercase mt-2">Warna Aplikasi</p>
                            <div className="flex justify-between px-2 pb-2">
                                {Object.values(THEMES).map(t => (
                                    <button key={t.id} onClick={() => setTheme(t)} className="flex flex-col items-center gap-1 group">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${theme.id === t.id ? 'ring-2 ring-offset-2 scale-110 shadow-md' : 'border border-gray-200 group-hover:scale-105'}`} style={{ backgroundColor: t.hex, ringColor: t.hex }}>
                                            {theme.id === t.id && <Check size={16} className="text-white animate-pop" strokeWidth={3} />}
                                        </div>
                                        <span className={`text-[9px] font-bold mt-1 ${theme.id === t.id ? 'text-gray-800' : 'text-gray-400'}`}>{t.id.charAt(0).toUpperCase() + t.id.slice(1)}</span>
                                    </button>
                                ))}
                            </div>
                        </Section>

                        <Section title="Tentang" icon={<Info size={18}/>}>
                            <div className="p-3 text-center">
                                <div className="w-12 h-12 rounded-[14px] mx-auto flex items-center justify-center mb-2 shadow-sm" style={{ backgroundColor: theme.light, color: theme.hex }}><BookOpen size={24} /></div>
                                <h4 className="font-black text-gray-800 text-sm">Al Kautsar Islamic</h4>
                                <p className="text-[9px] text-gray-400 font-bold mb-3">Versi 7.0.0 (Ultimate Edition)</p>
                                <p className="text-[10px] text-gray-500 leading-relaxed font-medium mb-4 text-justify">
                                    Aplikasi resmi SDIT Muhammadiyah Al Kautsar yang menyediakan Al-Quran digital tajwid cerdas, fitur Switcher (Lompat Cepat), Maktabah (PDF Jalalain), Tafsir Kemenag & Jalalayn per ayat, dan fitur interaktif lainnya.
                                </p>
                            </div>
                        </Section>
                    </div>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
