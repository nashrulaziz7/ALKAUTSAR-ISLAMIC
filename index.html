        /* Font Mushaf Standar Madinah (Muslim Pro) - Ketebalan Normal (Server Baru) */
        @font-face {
            font-family: 'KFGQPC_HAFS';

            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* Font Kemenag LPMQ */
        @font-face {
            font-family: 'LPMQ';
            src: url('https://cdn.jsdelivr.net/gh/lpmq-font/lpmq-font@master/lpmq.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; margin: 0; }
        
        @keyframes spin-slow { 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 35s linear infinite; }
        @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes bounce-soft { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .animate-bounce-soft { animation: bounce-soft 2s ease-in-out infinite; }
        
        /* Animasi Polkadot Super Jumbo & Fleksibel untuk Semua Kamar */
        @keyframes float-polka {
            0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.15; }
            33% { transform: translate(120px, -150px) scale(1.8); opacity: 0.3; }
            66% { transform: translate(-100px, 80px) scale(0.8); opacity: 0.25; }
        }
        .polka-dot { position: absolute; border-radius: 50%; animation: float-polka 15s ease-in-out infinite; pointer-events: none; }

        /* Font Arab - Disetel dengan fallback kuat agar perbedaan 100% terlihat nyata */
        .font-uthmani { font-family: 'KFGQPC_HAFS', 'Amiri Quran', 'Arial', serif !important; line-height: 2.0 !important; font-weight: normal !important; word-spacing: normal !important; }
        .font-kemenag { font-family: 'LPMQ', 'Lateef', 'Arial', serif !important; line-height: 2.2 !important; font-size: 1.15em !important; font-weight: normal !important; word-spacing: normal !important; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .tajweed-ghunnah { color: #D946EF !important; font-weight: normal !important; }

                        const resLoc = await fetchWithTimeout(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=id`, {}, 5000);

                            const dataLoc = await resLoc.json();
                            locName = dataLoc.locality || dataLoc.city || dataLoc.principalSubdivision || 'Lokasi Anda';
                        } else throw new Error();
                    } catch (e) { 
                        try {
                             const resNom = await fetchWithTimeout(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10`, { headers: { 'Accept-Language': 'id' } }, 5000);

                                 const dataNom = await resNom.json();
                                 locName = (dataNom.address && dataNom.address.city) || (dataNom.address && dataNom.address.county) || (dataNom.address && dataNom.address.state) || 'Lokasi Anda';

                { id: 'Isha', label: 'Isya', time: '--:--', icon: '🌙' }
            ];

            const activePrayers = prayerTimes || fallbackPrayers;

            const getNextPrayer = () => {
                if (!prayerTimes) return { label: 'Memuat...', time: '--:--', diff: '--:--:--' };
                const currentMins = time.getHours() * 60 + time.getMinutes();
                let next = activePrayers[0]; let isTom = true;
                for (let p of activePrayers) {
                    const [h, m] = p.time.split(':').map(Number);
                    if (h * 60 + m > currentMins) { next = p; isTom = false; break; }
                }
                const [nH, nM] = next.time.split(':').map(Number);
                let target = new Date(time); target.setHours(nH, nM, 0);
                if (isTom) target.setDate(target.getDate() + 1);
                
                const diff = target - time;
                const hrs = Math.floor((diff / (1000 * 60 * 60)) % 24).toString().padStart(2, '0');
                const mins = Math.floor((diff / 1000 / 60) % 60).toString().padStart(2, '0');
                const secs = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
                return { ...next, diff: `${hrs}:${mins}:${secs}` };

            const dateM = time.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
            let dateH = "";
            try { dateH = new Intl.DateTimeFormat('id-TN-u-ca-islamic', {day: 'numeric', month: 'long', year: 'numeric'}).format(time); } catch(e) { dateH = "Hijriah"; }

            return (

            const playingPartRef = useRef(playingPart);
            const surahDetailRef = useRef(surahDetail);
            const isPlayAllRef = useRef(isPlayAll);
            const activeSurahRef = useRef(activeSurah);

            useEffect(() => { playingAyahRef.current = playingAyah; }, [playingAyah]);
            useEffect(() => { playingPartRef.current = playingPart; }, [playingPart]);
            useEffect(() => { surahDetailRef.current = surahDetail; }, [surahDetail]);
            useEffect(() => { isPlayAllRef.current = isPlayAll; }, [isPlayAll]);
            useEffect(() => { activeSurahRef.current = activeSurah; }, [activeSurah]);

            // Deteksi scroll untuk Header Pintar & Animasi Halus
            useEffect(() => {
                const scrollContainer = document.getElementById('main-scroll-container');
                const handleScroll = () => {
                    if (scrollContainer && scrollContainer.scrollTop > 80) setIsScrolled(true);
                    else setIsScrolled(false);
                };
                if (scrollContainer) scrollContainer.addEventListener('scroll', handleScroll);
                return () => { if (scrollContainer) scrollContainer.removeEventListener('scroll', handleScroll); };
            }, [activeSurah]);

            const filteredSurahs = SURAHS_DB.filter(s => s.id.toLowerCase().includes(search.toLowerCase()) || s.n.toString() === search);

            useEffect(() => {
                if (navParams && navParams.surahId) {
                    const targetSurah = SURAHS_DB.find(s => s.n === navParams.surahId);
                    if(targetSurah) openSurah(targetSurah);
                }
            }, [navParams]);

            // Audio Anti-Macet logic
            const playAyahSequence = (ayahNum) => {
                if (!surahDetailRef.current) return;
                const targetAyah = surahDetailRef.current.find(a => a.numberInSurah === ayahNum);
                if (!targetAyah) { setIsPlayAll(false); return; }

                const needsBismillah = ayahNum === 1 && activeSurahRef.current?.n !== 1 && activeSurahRef.current?.n !== 9;
                setPlayingAyah(ayahNum);

                const playSafe = (src) => {
                    try {
                        audioRef.current.src = src;
                        audioRef.current.load();
                        const playPromise = audioRef.current.play();
                        
                        if (playPromise !== undefined) {
                            playPromise.catch(error => {
                                if (error.name === 'AbortError') return;

                                // Anti-Macet (Lompat jika API Bismillah down)
                                if (playingPartRef.current === 'bismillah') {
                                    setPlayingPart('ayah');
                                    playSafe(getAudioUrl(qari, activeSurahRef.current.n, targetAyah.numberInSurah));
                                } else {
                                    if (isPlayAllRef.current && activeSurahRef.current && ayahNum < activeSurahRef.current.ay) {
                                        playAyahSequence(ayahNum + 1);
                                        scrollToAyah(ayahNum + 1);
                                    } else {
                                        setPlayingAyah(null); setPlayingPart(null); setIsPlayAll(false);
                                    }
                                }
                            });
                        }
                    } catch(err) {}
                };

                if (needsBismillah) {
                    setPlayingPart('bismillah');
                    playSafe(BISMILLAH_UNIVERSAL); 
                } else {
                    setPlayingPart('ayah');
                    playSafe(getAudioUrl(qari, activeSurahRef.current.n, targetAyah.numberInSurah));
                }
            };

            useEffect(() => {
                const handleAudioEnded = () => {
                    if (!playingAyahRef.current || !surahDetailRef.current || !activeSurahRef.current) return;
                    const currentNum = playingAyahRef.current;
                    const currentPart = playingPartRef.current;
                    
                    if (currentPart === 'bismillah') {
                        setPlayingPart('ayah');
                        const aObj = surahDetailRef.current.find(a => a.numberInSurah === currentNum);
                        if(aObj) {
                            audioRef.current.src = getAudioUrl(qari, activeSurahRef.current.n, currentNum);
                            const playPromise = audioRef.current.play();
                            if(playPromise !== undefined) playPromise.catch(e => {});
                        }
                    } else {
                        if (isPlayAllRef.current && currentNum < activeSurahRef.current.ay) {
                            const nextAyahNum = currentNum + 1;
                            setPlayingAyah(nextAyahNum);
                            setPlayingPart('ayah'); 
                            audioRef.current.src = getAudioUrl(qari, activeSurahRef.current.n, nextAyahNum);
                            const playPromise = audioRef.current.play();
                            if(playPromise !== undefined) playPromise.catch(e => {});
                            scrollToAyah(nextAyahNum);
                        } else {
                            setPlayingAyah(null); setPlayingPart(null); setIsPlayAll(false);
                        }
                    }
                };
                const audioEl = audioRef.current;
                audioEl.addEventListener('ended', handleAudioEnded);
                return () => { if (audioEl) { audioEl.removeEventListener('ended', handleAudioEnded); audioEl.pause(); } };
            }, [qari]);

            // PROGRESSIVE FETCHING (Instan Load tanpa Skeleton, Background fetching)
            const openSurah = async (surah) => {
                setActiveSurah(surah); 
                setSurahDetail(null);
                setOpenedTafsir(null);
                setShowSwitcher(false);
                setShowSettings(false);
                setIsPlayAll(false);
                setShowAsbabun(false);
                setActiveTajweed(null);
                setIsScrolled(false);
                
                try {
                    // 1. Fetch Teks Dasar Kemenag (Sangat Cepat - Hitungan ms)
                    const resKemenag = await fetchWithTimeout(`https://equran.id/api/v2/surat/${surah.n}`);
                    if (resKemenag.ok) {
                        const dataKemenag = await resKemenag.json();
                        setSurahDesc(dataKemenag.data.deskripsi);
                        
                        const basicAyahs = dataKemenag.data.ayat.map(a => ({
                            numberInSurah: a.nomorAyat,
                            text: a.teksArab, // Teks arab dasar
                            latin: a.teksLatin,
                            trans: a.teksIndonesia,
                            tajweedRules: [], // Kosong dulu
                            tafsirKemenag: "Memuat tafsir...",
                            tafsirJalalayn: "Memuat tafsir..."
                        }));
                        
                        // RENDER INSTAN SEKARANG JUGA! (Tanpa loading skeleton jadul)
                        setSurahDetail(basicAyahs);

                        // 2. Fetch Tajwid & Tafsir Siluman di Latar Belakang (Progressive)
                        Promise.allSettled([
                            fetchWithTimeout(`https://equran.id/api/v2/tafsir/${surah.n}`),
                            fetchWithTimeout(`https://api.alquran.cloud/v1/surah/${surah.n}/id.jalalayn`),
                            fetchWithTimeout(`https://raw.githubusercontent.com/nashrulaziz7/quran-data/main/${surah.n}.json`)
                        ]).then(async ([resTafsirKemenag, resTafsirJalalayn, resGithub]) => {
                            let dTK = null, dTJ = null, dG = [];
                            
                            if (resTafsirKemenag.status === 'fulfilled' && resTafsirKemenag.value.ok) dTK = await resTafsirKemenag.value.json();
                            if (resTafsirJalalayn.status === 'fulfilled' && resTafsirJalalayn.value.ok) dTJ = await resTafsirJalalayn.value.json();
                            if (resGithub.status === 'fulfilled' && resGithub.value.ok) {
                                const jsonG = await resGithub.value.json();
                                dG = Array.isArray(jsonG) ? jsonG : (jsonG.data || []);
                            }

                            // Inject data tajwid & tafsir secara senyap tanpa loading screen
                            setSurahDetail(prev => {
                                if (!prev) return prev;
                                return prev.map((a, index) => {
                                    // Cari rules tajwid yang cocok dari data github
                                    const githubAyah = dG.find(g => (g.aya_number === a.numberInSurah || g.nomorAyat === a.numberInSurah)) || {};
                                    const rules = githubAyah.tajweed || githubAyah.tajwid || [];
                                    
                                    let tKem = "Tafsir Kemenag tidak tersedia saat ini.";
                                    if (dTK && dTK.data && dTK.data.tafsir) {
                                        const ft = dTK.data.tafsir.find(t => t.ayat === a.numberInSurah);
                                        if (ft && ft.teks) tKem = ft.teks;
                                    }
                                    
                                    let tJal = "Tafsir Jalalayn tidak tersedia saat ini.";
                                    if (dTJ && dTJ.data && dTJ.data.ayahs && dTJ.data.ayahs[index]) {
                                        tJal = dTJ.data.ayahs[index].text || tJal;
                                    }

                                    return {
                                        ...a,
                                        text: githubAyah.aya_text || a.text,
                                        tajweedRules: rules,
                                        tafsirKemenag: tKem,
                                        tafsirJalalayn: tJal
                                    };
                                });
                            });
                        });
                    } else {
                        throw new Error("Gagal mengambil teks");
                    }
                } catch (err) {
                    setSurahDetail([{numberInSurah: 1, text: "Gagal memuat ayat.", latin: "", trans: "Harap periksa koneksi internet Anda.", tajweedRules: [], tafsirKemenag: "Gagal memuat.", tafsirJalalayn: "Gagal Memuat."}]);
                }
            };

            const scrollToAyah = (ayahNum) => {
                 const el = document.getElementById(`ayah-${ayahNum}`);
                 if(el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); const originalBg = el.style.backgroundColor; el.style.backgroundColor = theme.light; el.style.transition = 'background-color 0.5s ease'; setTimeout(() => { el.style.backgroundColor = originalBg; }, 2000); }
                 setShowSwitcher(false);
            };

            // Fungsi Rendering Warna Tajwid & Klik Popup
            const renderArabicWithTajweed = (text, rules) => {
                if (!showTajwid || !rules || rules.length === 0 || !text) return text;
                let elements = []; let lastIndex = 0; const sortedRules = [...rules].sort((a, b) => a.start - b.start);

                sortedRules.forEach((rule, idx) => {
                    if (rule.start > lastIndex) elements.push(<span key={`plain-${idx}`}>{text.slice(lastIndex, rule.start)}</span>);
                    elements.push(
                        <span key={`tajweed-${idx}`} className={`tajweed-${rule.class} cursor-pointer hover:opacity-80 transition-all font-normal`} onClick={(e) => { e.preventDefault(); e.stopPropagation(); setActiveTajweed({ ruleClass: rule.class, word: text.slice(rule.start, rule.end) }); }}>
                            {text.slice(rule.start, rule.end)}
                        </span>
                    );
                    lastIndex = rule.end;
                });
                if (lastIndex < text.length) elements.push(<span key={`plain-end`}>{text.slice(lastIndex)}</span>);
                return elements;
            };

            if (activeSurah) {
                return (
                    <div className="pb-20 min-h-full relative bg-transparent">
                        
                        {/* HEADER STICKY PINTAR & PREMIUM */}
                        <div className="sticky top-0 z-40 w-full shadow-[0_4px_20px_rgba(0,0,0,0.05)]" style={{ backgroundColor: theme.hex }}>
                            <div className="flex items-center justify-between px-3 py-3 h-14 relative z-20">
                                <div className="flex items-center gap-1 flex-1 min-w-0">
                                    <button onClick={() => { setActiveSurah(null); if (audioRef.current) { audioRef.current.pause(); audioRef.current.removeAttribute('src'); audioRef.current.load(); } setPlayingAyah(null); setPlayingPart(null); setIsPlayAll(false); }} className="p-2 rounded-xl transition-all text-white hover:bg-white/20 active:scale-95 shrink-0">
                                        <ArrowLeft size={20} />
                                    </button>
                                    
                                    {/* Judul Muncul Hanya Jika Discroll (Header Pintar Halus) */}
                                    <div className={`cursor-pointer flex flex-col justify-center truncate transition-all duration-500 ease-in-out ${isScrolled ? 'opacity-100 translate-x-0 w-auto ml-1' : 'opacity-0 -translate-x-4 w-0 pointer-events-none'}`} onClick={() => setShowSwitcher(true)}>
                                        <h2 className="font-black text-[14px] text-white tracking-tight leading-tight truncate">{activeSurah.n}. {activeSurah.id}</h2>
                                        <p className="text-[9px] font-bold text-white/80 truncate">{activeSurah.type} • {activeSurah.ay} Ayat</p>
                                    </div>
                                </div>

                                <div className="flex items-center shrink-0 text-white gap-0.5">
                                    <button onClick={() => setIsPageMode(!isPageMode)} className={`p-2 rounded-xl transition-all hover:bg-white/20 active:scale-95 ${isPageMode ? 'bg-white/20 shadow-inner' : ''}`} title="Mode Halaman">
                                        {isPageMode ? <BookOpen size={18} /> : <LayoutGrid size={18} />}
                                    </button>
                                    <button onClick={() => setShowAsbabun(true)} className="p-2 rounded-xl transition-all hover:bg-white/20 active:scale-95" title="Asbabun Nuzul">
                                        <Info size={18} />
                                    </button>
                                    <button onClick={() => {
                                        if (isPlayAll) { setIsPlayAll(false); if (!audioRef.current.paused) audioRef.current.pause(); setPlayingAyah(null); setPlayingPart(null); } 
                                        else { setIsPlayAll(true); if (!surahDetail || surahDetail.length === 0) return; playAyahSequence(1); scrollToAyah(1); }
                                    }} className={`p-2 rounded-xl transition-all hover:bg-white/20 active:scale-95 ${isPlayAll ? 'bg-white/20 text-yellow-300 shadow-inner' : ''}`} title="Putar Semua Ayat">
                                        {isPlayAll ? <Pause size={18} /> : <ListMusic size={18} />}
                                    </button>
                                    <button onClick={() => setShowSettings(!showSettings)} className={`p-2 rounded-xl transition-all hover:bg-white/20 active:scale-95 ${showSettings ? 'bg-white/20 shadow-inner' : ''}`} title="Pengaturan">
                                        <Settings2 size={18} />
                                    </button>
                                </div>
                            </div>

                            {/* Dropdown Settings Premium Glassmorphism (Sesuai Foto 1) */}
                            <div className={`overflow-hidden transition-all duration-300 absolute w-full z-10`} style={{ backgroundColor: theme.hex, top: '100%', left: 0, boxShadow: showSettings ? '0 10px 15px -3px rgba(0, 0, 0, 0.1)' : 'none', maxHeight: showSettings ? '200px' : '0px', opacity: showSettings ? 1 : 0 }}>
                                <div className="px-4 pb-4 pt-1">
                                    <div className="flex flex-col gap-2.5 relative z-10">
                                        <div className="flex gap-2">
                                            <div className="flex items-center p-1 rounded-xl shrink-0 border shadow-inner bg-white/20 border-white/10">
                                                <span className="text-[10px] font-black text-white px-2 opacity-90 uppercase tracking-widest hidden sm:block">Ukuran</span>
                                                <button onClick={() => setFontSize(Math.max(20, fontSize - 2))} className="w-7 h-7 flex items-center justify-center bg-white rounded-lg shadow-sm text-gray-800 font-bold active:scale-95">-</button>
                                                <span className="text-[12px] font-black text-white w-8 text-center">{fontSize}</span>
                                                <button onClick={() => setFontSize(Math.min(48, fontSize + 2))} className="w-7 h-7 flex items-center justify-center bg-white rounded-lg shadow-sm text-gray-800 font-bold active:scale-95">+</button>
                                            </div>
                                            <select value={qari} onChange={e => { setQari(e.target.value); if(!audioRef.current.paused) audioRef.current.pause(); setPlayingAyah(null); }} className="flex-1 bg-white px-3 py-1.5 rounded-xl text-[11px] font-bold text-gray-800 outline-none shadow-sm truncate border-0 appearance-none bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiBzdHJva2U9IiM0QjU1NjMiIHN0cm9rZS13aWR0aD0iMiIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBzdHJva2UtbGluZWpvaW49InJvdW5kIj48cG9seWxpbmUgcG9pbnRzPSI2IDkgMTIgMTUgMTggOSI+PC9wb2x5bGluZT48L3N2Zz4=')] bg-no-repeat bg-[position:right_8px_center] bg-[length:16px]">
                                                {QARI_LIST.map(q => <option key={q.id} value={q.id}>{q.name}</option>)}
                                            </select>
                                        </div>
                                        <div className="flex gap-2">
                                            <div className="flex flex-1 p-1 rounded-xl gap-1 border shadow-inner bg-white/20 border-white/10">
                                                <button onClick={() => setShowTajwid(!showTajwid)} className={`flex-1 py-2 rounded-lg text-[10px] font-bold transition-all ${showTajwid ? 'bg-white shadow-sm text-gray-800' : 'text-white hover:bg-white/10'}`}>Tajwid</button>
                                                <button onClick={() => setShowLatin(!showLatin)} className={`flex-1 py-2 rounded-lg text-[10px] font-bold transition-all ${showLatin ? 'bg-white shadow-sm text-gray-800' : 'text-white hover:bg-white/10'}`}>Latin</button>
                                                <button onClick={() => setShowTrans(!showTrans)} className={`flex-1 py-2 rounded-lg text-[10px] font-bold transition-all ${showTrans ? 'bg-white shadow-sm text-gray-800' : 'text-white hover:bg-white/10'}`}>Arti</button>
                                            </div>
                                            <div className="flex shrink-0 p-1 rounded-xl gap-1 border shadow-inner bg-white/20 border-white/10">
                                                <button onClick={() => setFontType('uthmani')} className={`px-3 py-2 rounded-lg text-[10px] font-bold transition-all ${fontType === 'uthmani' ? 'bg-white shadow-sm text-gray-800' : 'text-white/80 hover:bg-white/10'}`}>Madinah</button>
                                                <button onClick={() => setFontType('kemenag')} className={`px-3 py-2 rounded-lg text-[10px] font-bold transition-all ${fontType === 'kemenag' ? 'bg-white shadow-sm text-gray-800' : 'text-white/80 hover:bg-white/10'}`}>Kemenag</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Banner Surah Minimalis (Lebih Ramping & Polkadot Aktif) */}
                        <div onClick={() => setShowSwitcher(true)} className="mx-4 mt-4 mb-2 rounded-[20px] p-4 text-center shadow-md relative overflow-hidden cursor-pointer active:scale-95 transition-transform" style={{ background: `linear-gradient(135deg, ${theme.hex}, ${theme.hex}dd)` }}>
                            {/* Efek Polkadot Eksklusif Banner */}
                            <div className="absolute polka-dot w-20 h-20 top-[-20%] left-[-10%] bg-white/20 blur-sm" style={{ animationDelay: '0s' }}></div>
                            <div className="absolute polka-dot w-28 h-28 bottom-[-20%] right-[-10%] bg-white/20 blur-sm" style={{ animationDelay: '2s' }}></div>
                            <div className="absolute polka-dot w-14 h-14 top-[50%] right-[30%] bg-white/20 blur-[2px]" style={{ animationDelay: '4s' }}></div>
                            
                            <h2 className="text-[24px] font-uthmani text-white mb-0 drop-shadow-md relative z-10 leading-none">{activeSurah.ar}</h2>
                            <h3 className="font-black text-white text-[12px] uppercase tracking-widest relative z-10 mt-1 mb-0.5">{activeSurah.id}</h3>
                            <p className="text-[9px] font-bold text-white/90 mb-1.5 relative z-10 tracking-wide">{activeSurah.tr}</p>
                            <div className="bg-white/20 inline-block px-3 py-1 rounded-full relative z-10 border border-white/10 shadow-sm backdrop-blur-sm">
                                <p className="text-[8px] font-bold text-white uppercase tracking-wider">{activeSurah.type} • {activeSurah.ay} Ayat</p>
                            </div>
                        </div>

                        {/* Pop-Up Info Asbabun Nuzul */}
                        {showAsbabun && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in" onClick={() => setShowAsbabun(false)}>
                                <div className="bg-white w-full max-w-[340px] rounded-[24px] shadow-2xl p-6 relative" onClick={(e) => e.stopPropagation()}>
                                    <button onClick={() => setShowAsbabun(false)} className="absolute top-4 right-4 p-1.5 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 active:scale-95 transition-all"><X size={16}/></button>
                                    <h3 className="font-black text-gray-800 text-[18px] mb-1">Asbabun Nuzul</h3>
                                    <p className="text-[10px] font-bold text-gray-500 mb-5">{activeSurah.id} • Kemenag RI</p>
                                    <div className="max-h-[60vh] overflow-y-auto pr-2 text-[11px] leading-loose text-gray-700 font-medium text-justify">
                                        <div dangerouslySetInnerHTML={{__html: surahDesc || "Info/Asbabun Nuzul tidak tersedia untuk Surah ini."}}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Pop-Up Tajwid Eksklusif (Premium Dark Mode + Audio Kata) */}
                        {activeTajweed && TAJWEED_INFO[activeTajweed.ruleClass] && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in" onClick={() => setActiveTajweed(null)}>
                                <div className="bg-[#1E293B] w-full max-w-[340px] rounded-[24px] shadow-2xl p-6 relative text-white border border-white/10" onClick={(e) => e.stopPropagation()}>
                                    <button onClick={() => setActiveTajweed(null)} className="absolute top-4 right-4 p-1.5 bg-white/10 rounded-full text-white/70 hover:bg-white/20 active:scale-95 transition-all"><X size={16}/></button>
                                    
                                    <h3 className="font-black text-[18px] mb-3" style={{ color: TAJWEED_INFO[activeTajweed.ruleClass].color }}>
                                        {TAJWEED_INFO[activeTajweed.ruleClass].title}
                                    </h3>
                                    <p className="text-[11px] leading-loose font-medium text-gray-300 mb-5 text-justify">
                                        {TAJWEED_INFO[activeTajweed.ruleClass].desc}
                                    </p>

                                    <div className="bg-black/40 rounded-[16px] p-4 flex items-center justify-between border border-white/5 shadow-inner">
                                        <button onClick={(e) => {
                                                e.stopPropagation();
                                                if ('speechSynthesis' in window) {
                                                    const utterance = new SpeechSynthesisUtterance(activeTajweed.word);
                                                    utterance.lang = 'ar-SA';
                                                    window.speechSynthesis.speak(utterance);
                                                } else alert("Browser tidak mendukung suara Arab.");
                                            }} 
                                            className="p-3 bg-white/10 rounded-full hover:bg-white/20 active:scale-95 transition-all shadow-sm"
                                        >
                                            <Play size={18} className="text-white shrink-0 ml-0.5" />
                                        </button>
                                        <span className={`text-[30px] font-uthmani font-normal drop-shadow-md text-right ml-4 tajweed-${activeTajweed.ruleClass}`} dir="rtl">
                                            {activeTajweed.word}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Switcher Cepat */}
                        {showSwitcher && (
                            <div className="fixed inset-0 z-[60] flex flex-col justify-end bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
                                <div className="bg-white w-full h-[75dvh] max-w-[390px] mx-auto rounded-t-[32px] shadow-2xl flex flex-col animate-in slide-in-from-bottom-8 duration-300">
                                    <div className="flex items-center justify-between p-5 border-b border-gray-100">
                                        <div><h3 className="font-black text-gray-800 text-[16px]">Navigasi Cepat</h3><p className="text-[10px] font-bold text-gray-500">Lompat ke Surah atau Ayat</p></div>
                                        <button onClick={() => setShowSwitcher(false)} className="p-2 bg-gray-100 rounded-full text-gray-500 active:scale-95"><X size={16}/></button>
                                    </div>
                                    <div className="flex p-3 gap-2 border-b border-gray-50">
                                        <button onClick={() => setSwitcherTab('surah')} className={`flex-1 py-2.5 rounded-xl text-[12px] font-bold transition-all ${switcherTab === 'surah' ? 'text-white shadow-sm' : 'bg-gray-100 text-gray-500'}`} style={switcherTab === 'surah' ? { backgroundColor: theme.hex } : {}}>Pilih Surah</button>
                                        <button onClick={() => setSwitcherTab('ayah')} className={`flex-1 py-2.5 rounded-xl text-[12px] font-bold transition-all ${switcherTab === 'ayah' ? 'text-white shadow-sm' : 'bg-gray-100 text-gray-500'}`} style={switcherTab === 'ayah' ? { backgroundColor: theme.hex } : {}}>Pilih Ayat</button>
                                    </div>
                                    <div className="flex-1 overflow-y-auto p-4">
                                        {switcherTab === 'surah' ? (
                                            <div className="space-y-2 pb-10">

        function MasjidView({ nav, theme, userLoc }) {
            const [masjids, setMasjids] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const getMasjids = async () => {
                    setLoading(true);
                    try {
                        const query = `[out:json];node(around:3000,${userLoc.lat},${userLoc.lon})[amenity=place_of_worship][religion=muslim];out 5;`;
                        const res = await fetch(`https://overpass-api.de/api/interpreter?data=${encodeURIComponent(query)}`);
                        const data = await res.json();
                        
                        const R = 6371; 
                        const results = data.elements.map(e => {
                            const dLat = (e.lat - userLoc.lat) * Math.PI / 180;
                            const dLon = (e.lon - userLoc.lon) * Math.PI / 180;
                            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userLoc.lat * Math.PI / 180) * Math.cos(e.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                            const dist = R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
                            return { name: e.tags.name || 'Masjid Terdekat', dist: dist.toFixed(1) + ' km', raw: dist, lat: e.lat, lon: e.lon };
                        }).filter(e => e.name !== 'Masjid Terdekat').sort((a, b) => a.raw - b.raw).slice(0, 5);
                        
                        setMasjids(results.length > 0 ? results : [{name: 'Masjid Agung Raya (Offline Mode)', dist: '1.5 km', lat: userLoc.lat, lon: userLoc.lon}]);
                    } catch(e) {
                        setMasjids([{name: 'Masjid Agung Raya (Offline Mode)', dist: '1.5 km', lat: userLoc.lat, lon: userLoc.lon}]);
                    }
                    setLoading(false);
                }
                getMasjids();
            }, [userLoc]);

            return (
                <div className="animate-in fade-in h-[100dvh] flex flex-col bg-transparent relative z-10">

                            ) : (

                                    <button key={i} onClick={() => window.open(`https://www.google.com/maps/dir/?api=1&destination=${m.lat},${m.lon}`, '_blank')} className="w-full bg-white p-4 rounded-[20px] shadow-lg flex justify-between items-center border-l-4 active:scale-95 transition-all hover:bg-slate-50" style={{ borderLeftColor: theme.hex }}>

                const handler = (e) => setHeading(e.webkitCompassHeading || Math.abs(e.alpha - 360) || 0); 
                window.addEventListener('deviceorientation', handler, true); 
                
                const latK = 21.422487 * (Math.PI / 180); 
                const lonK = 39.826206 * (Math.PI / 180); 
                const latU = userLoc.lat * (Math.PI / 180); 
                const lonU = userLoc.lon * (Math.PI / 180); 

                const y = Math.sin(lonK - lonU);
                const x = Math.cos(latU) * Math.tan(latK) - Math.sin(latU) * Math.cos(lonK - lonU);
                let qiblaDir = Math.atan2(y, x) * (180 / Math.PI);
                qiblaDir = (qiblaDir + 360) % 360;

                const R = 6371; 
                const dLat = latK - latU;
                const dLon = lonK - lonU;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(latU) * Math.cos(latK) * Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                const dist = R * c;

                setQiblaInfo({ dir: qiblaDir, dist: dist });
                return () => window.removeEventListener('deviceorientation', handler, true); 
            }, [userLoc]);

            return (
                <div className="px-5 pt-8 pb-10 animate-in fade-in h-[100dvh] bg-transparent relative z-10">
                    <div className="flex items-center gap-3 mb-6">
                        <button onClick={()=>nav('home')} className="p-2.5 rounded-[14px] bg-white shadow-sm hover:shadow-md transition-shadow active:scale-95"><ArrowLeft size={20} className="text-gray-600" /></button>
                        <h1 className="text-2xl font-black text-gray-800 tracking-tight">Arah Kiblat</h1>
                    </div>
                    
                    <div className="relative flex justify-center items-center w-64 h-64 mx-auto mb-10 mt-10">
                        <div className="absolute inset-0 rounded-full border-[8px] border-white shadow-xl flex items-center justify-center transition-transform duration-100 bg-[#F4F9F9]" style={{ transform: `rotate(${-heading}deg)` }}>
                            <span className="absolute top-4 font-bold text-gray-400 text-sm">S</span><span className="absolute bottom-4 font-black text-sm" style={{ color: theme.hex }}>N</span><span className="absolute right-4 font-bold text-gray-400 text-sm">W</span><span className="absolute left-4 font-bold text-gray-400 text-sm">E</span>
                            <div className="absolute inset-2 rounded-full border border-dashed border-gray-300"></div>
                        </div>
                        <div className="w-4 h-4 bg-amber-500 rounded-full z-10 shadow-md ring-2 ring-white"></div>
                        <div className="absolute inset-0 transition-transform duration-100 z-10 flex justify-center" style={{ transform: `rotate(${qiblaInfo.dir - heading}deg)` }}>
                            <div className="mt-8">
                                <div className="w-12 h-12 rounded-full flex items-center justify-center shadow-lg" style={{ backgroundColor: theme.light }}>
                                    <div className="w-6 h-7 bg-slate-900 rounded-[2px] border border-amber-400 flex items-center"><div className="w-full h-[2px] bg-amber-400 mt-1"></div></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-3 mt-20">
                        <div className="col-span-2 bg-white p-4 rounded-[20px] shadow-sm">
                            <p className="text-[10px] font-bold mb-1 flex items-center gap-1" style={{ color: theme.hex }}><MapPin size={12}/> Lokasi Anda</p>
                            <p className="text-sm font-bold text-gray-800">{userLoc.name}</p>
                        </div>
                        <div className="bg-white p-4 rounded-[20px] shadow-sm"><p className="text-[10px] font-bold mb-1" style={{ color: theme.hex }}>Arah Kiblat</p><p className="text-lg font-black text-gray-800">{qiblaInfo.dir.toFixed(1)}°</p></div>
                        <div className="bg-white p-4 rounded-[20px] shadow-sm"><p className="text-[10px] font-bold text-amber-500 mb-1">Jarak Ka'bah</p><p className="text-lg font-black text-gray-800">{qiblaInfo.dist.toFixed(1)} km</p></div>
                    </div>
                </div>
            );
        }

        function ChatView({ nav, theme }) {
            const [messages, setMessages] = useState([{ role: 'model', text: "Wa'alaikumussalam! 👋 Aku asisten AI Tarjih. Lagi mau nanya hukum agama, atau cuma mau curhat tipis-tipis? Sini aku bantu jawab sesuai HPT Muhammadiyah." }]);
            const [input, setInput] = useState('');
            const [loading, setLoading] = useState(false);
            const endRef = useRef(null);

            useEffect(() => { if (endRef.current) endRef.current.scrollIntoView({ behavior: "smooth" }); }, [messages]);

            const handleSend = () => {
                if (!input.trim()) return;
                setMessages(prev => [...prev, { role: 'user', text: input }]);
                const userText = input.toLowerCase(); setInput(''); setLoading(true);
                
                setTimeout(() => {
                    let reply = "";
                    if (userText.match(/assalamu|salam|halo|hai|pagi|siang|sore|malam/)) reply = "Wa'alaikumussalam warahmatullah! Halo bro! Gimana harimu? Jangan lupa sholatnya dijaga ya.";
                    else if (userText.match(/lapar|makan|haus|ngantuk|capek/)) reply = "Waduh, kalau kebutuhan fisik harus dipenuhi dulu bro biar ibadahnya khusyuk. Jangan lupa baca bismillah ya! 😄";
                    else if (userText.match(/sedih|galau|bingung|nangis|kecewa/)) reply = "Sabar ya bro. Allah itu selalu dekat kok (Al-Baqarah: 186). Coba wudhu dan sholat dua rakaat, insyaAllah hatinya lebih tenang. Semangat! 😊";
                    else if (userText.match(/hukum|bolehkah|apa dalil|wajib|sunnah|haram/)) reply = "Kalo menurut HPT Muhammadiyah, dalam urusan ibadah kita harus berpegang teguh sama dalil yang shahih (Quran/Sunnah). Kalau urusan muamalah (dunia), pada dasarnya mubah (boleh) kok selama nggak ada dalil yang melarangnya. Gimana detail pertanyaannya?";
                    else reply = "Menarik tuh bro! Btw, aku asisten tarjih nih, jadi senengnya bahas seputar agama, amalan, atau jadi tempat ngingetin kebaikan. Ada hal lain yang mau di-share?";
                    setMessages(prev => [...prev, { role: 'model', text: reply }]);
                    setLoading(false);
                }, 1200);
            };

            return (
                <div className="h-[100dvh] flex flex-col animate-in slide-in-from-right-4 pb-16 bg-transparent relative z-10">
                    <div className="bg-white/90 backdrop-blur-md px-4 py-3 flex items-center shadow-sm z-30">
                        <button onClick={() => nav('home')} className="p-2 rounded-xl bg-gray-100 mr-3 hover:bg-gray-200 transition-colors"><ArrowLeft size={18} /></button>
                        <div><h1 className="text-[13px] font-black text-gray-800">Tarjih AI (Gaul)</h1><p className="text-[9px] font-bold text-green-500">Sesuai HPT Muhammadiyah</p></div>
                    </div>
                    <div className="flex-1 p-4 overflow-y-auto space-y-4 relative z-10">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`p-3.5 rounded-[20px] max-w-[85%] text-[12px] font-medium leading-relaxed shadow-sm ${m.role === 'user' ? 'text-white rounded-tr-none' : 'bg-white text-gray-700 rounded-tl-none'}`} style={m.role === 'user' ? { backgroundColor: theme.hex } : {}}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                        {loading && <div className="flex justify-start"><div className="bg-white p-3 rounded-[20px] rounded-tl-none shadow-sm flex gap-1"><span className="w-1.5 h-1.5 bg-gray-400 rounded-full animate-bounce"></span></div></div>}
                        <div ref={endRef}></div>
                    </div>
                    <div className="p-4 bg-white/90 backdrop-blur-md border-t border-gray-100 flex gap-2 relative z-20">
                        <input type="text" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter' && handleSend()} placeholder="Tanya santai soal agama..." className="flex-1 bg-gray-100 rounded-full px-4 py-2.5 text-xs font-medium outline-none focus:ring-2 transition-all" style={{ focusRingColor: theme.hex }} />
                        <button onClick={handleSend} disabled={loading} className="w-10 h-10 rounded-full flex items-center justify-center text-white shadow-md active:scale-95 transition-transform" style={{ backgroundColor: theme.hex }}><Send size={16} className="ml-1 -mt-0.5"/></button>
                    </div>
                </div>
            );
        }

        function BookmarkView({ nav, theme }) {
            const bookmarks = [ { surahId: 36, name: 'Ya Sin', desc: 'Jantung Al-Quran' }, { surahId: 114, name: 'An-Nas', desc: 'Sering dibaca' } ];
            return (
                <div className="pb-10 animate-in slide-in-from-right-4 h-[100dvh] bg-transparent relative z-10">
                    <div className="bg-white/90 backdrop-blur-md px-5 py-4 flex items-center shadow-sm z-30 sticky top-0"><button onClick={() => nav('home')} className="p-2 rounded-xl bg-gray-100 mr-3"><ArrowLeft size={18} /></button><h1 className="text-[15px] font-black text-gray-800">Bookmark Saya</h1></div>
                    <div className="p-4 space-y-3 relative z-10">
                        {bookmarks.map((b, i) => (
                            <div key={i} onClick={() => nav('quran', { surahId: b.surahId })} className="bg-white p-4 rounded-[20px] shadow-sm flex justify-between items-center cursor-pointer active:scale-95 border border-transparent hover:border-gray-200">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-[12px] flex items-center justify-center" style={{ backgroundColor: theme.light, color: theme.hex }}><Bookmark size={18} /></div>
                                    <div><h3 className="font-bold text-[13px] text-gray-800">Surah {b.name}</h3><p className="text-[10px] text-gray-500 font-medium">{b.desc}</p></div>
                                </div>
                                <div className="text-[9px] font-bold text-blue-500 flex items-center gap-1 bg-blue-50 px-2.5 py-1.5 rounded-lg">Buka <ChevronRight size={12}/></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function MaktabahView({ nav, theme }) {
            const pdfUrl = "https://raw.githubusercontent.com/nashrulaziz7/quran-data/main/Terjemah%20Tafsir%20Jalalain%2030%20Juz.pdf";
            const viewerUrl = `https://docs.google.com/viewer?url=${encodeURIComponent(pdfUrl)}&embedded=true`;
            return (
                <div className="animate-in fade-in h-[100dvh] flex flex-col bg-transparent relative z-10">
                    <div className="bg-white/90 backdrop-blur-md px-5 py-4 flex items-center justify-between shadow-sm z-30">
                        <div className="flex items-center">
                            <button onClick={() => nav('home')} className="p-2 rounded-xl bg-gray-100 mr-3 active:scale-95 transition-transform hover:bg-gray-200"><ArrowLeft size={18} /></button>
                            <div><h1 className="text-[15px] font-black text-gray-800 tracking-tight">Maktabah</h1><p className="text-[10px] font-bold" style={{ color: theme.hex }}>Tafsir Jalalain 30 Juz</p></div>
                        </div>
                        <a href={pdfUrl} target="_blank" rel="noreferrer" className="p-2 bg-gray-100 rounded-xl text-gray-600 active:scale-95 transition-transform hover:bg-gray-200 shadow-sm"><Download size={18} /></a>
                    </div>
                    <div className="flex-1 w-full bg-gray-200 relative z-10"><iframe src={viewerUrl} className="w-full h-full border-none" title="Tafsir Jalalain PDF Reader" /></div>
                </div>
            );
        }

        function SettingsView({ nav, theme, setTheme }) {
            const Section = ({ title, icon, children }) => (
                <div className="mb-6 relative z-10">
                    <h3 className="text-[13px] font-bold text-gray-700 flex items-center gap-2 mb-3 px-1"><span style={{ color: theme.hex }}>{icon}</span> {title}</h3>
                    <div className="bg-white rounded-[20px] p-2 shadow-sm border border-gray-100">{children}</div>
                </div>
            );

            return (
                <div className="pb-10 animate-in slide-in-from-right-4 bg-transparent relative z-10">
                    <div className="sticky top-0 bg-white/90 backdrop-blur-md px-5 pt-8 pb-4 flex items-center z-30 shadow-sm border-b border-gray-100">
                        <button onClick={() => nav('home')} className="p-2 rounded-xl bg-gray-800 text-white mr-4 active:scale-95 hover:bg-gray-900 transition-colors"><ArrowLeft size={18} /></button>
                        <h1 className="text-[18px] font-black text-gray-800 tracking-tight flex items-center gap-2"><Settings size={22} style={{ color: theme.hex }} /> Pengaturan</h1>
                    </div>
                    <div className="p-5 relative z-10">
                        <Section title="Tampilan & Tema Warna" icon={<Palette size={18}/>}>
                            <p className="text-[10px] font-bold text-gray-400 mb-2 px-2 uppercase mt-2">Warna Aplikasi</p>
                            <div className="flex justify-between px-2 pb-2">
                                {Object.values(THEMES).map(t => (
                                    <button key={t.id} onClick={() => setTheme(t)} className="flex flex-col items-center gap-1 group">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center transition-all ${theme.id === t.id ? 'ring-2 ring-offset-2 scale-110 shadow-md' : 'border border-gray-200 group-hover:scale-105'}`} style={{ backgroundColor: t.hex, ringColor: t.hex }}>
                                            {theme.id === t.id && <Check size={16} className="text-white animate-pop" strokeWidth={3} />}
                                        </div>
                                        <span className={`text-[9px] font-bold mt-1 ${theme.id === t.id ? 'text-gray-800' : 'text-gray-400'}`}>{t.id.charAt(0).toUpperCase() + t.id.slice(1)}</span>
                                    </button>
                                ))}
                            </div>
                        </Section>
                        <Section title="Tentang" icon={<Info size={18}/>}>
                            <div className="p-3 text-center">
                                <div className="w-12 h-12 rounded-[14px] mx-auto flex items-center justify-center mb-2 shadow-sm" style={{ backgroundColor: theme.light, color: theme.hex }}><BookOpen size={24} /></div>
                                <h4 className="font-black text-gray-800 text-sm">Al Kautsar Islamic</h4>
                                <p className="text-[9px] text-gray-400 font-bold mb-3">Versi 10.0 (Ultimate Edition)</p>
                                <p className="text-[10px] text-gray-500 leading-relaxed font-medium mb-4 text-justify">Aplikasi resmi SDIT Muhammadiyah Al Kautsar yang menyediakan Al-Quran digital tajwid cerdas, fitur Switcher (Lompat Cepat), Maktabah (PDF Jalalain), Tafsir Kemenag & Jalalayn per ayat, GPS Masjid Terdekat, Arah Kiblat Real-time, dan fitur interaktif premium lainnya.</p>
                            </div>
                        </Section>
                    </div>
                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = ReactDOM.createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
